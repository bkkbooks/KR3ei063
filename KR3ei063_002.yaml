此等驗如影響切宜避之惡阻類治婦人經候不行身無病而似病脈滑大而六脈俱勻乃是孕婦之脈也精神如故惡聞食臭或但嗜一物或大吐或時吐清水此名惡阻切勿作寒病治之宜服此藥如覺噁心嘔吐加丁香生薑煎服保生湯人參甘草各二錢半白朮香附子烏藥橘紅各半兩上㕮咀每服三大錢水一盞半姜五片煎至七分去滓溫服無時或作末子調服姜參半夏丸妊娠嘔吐不止乾薑人參各一兩半夏湯洗去滑二兩上三味末之以生薑汁糊為丸梧桐子大每服十丸日三服半夏茯苓湯治妊娠惡阻嘔吐心煩頭目眩暈惡聞食氣好食酸鹹多臥少起百節煩疼羸瘦有痰胎孕不安半夏洗一兩二錢半赤茯苓熟地黃各七錢半橘紅旋覆花人參芍藥川芎桔梗甘草各半兩細辛三錢上㕮咀每服五錢姜七片水煎空心服兼服茯苓丸若有客熱煩渴口瘡去橘紅細辛加前胡知母七錢五分若腹冷下痢去地黃加炒桂心半兩若胃中虛熱大便祕小便赤澀加大黃七錢半去地黃加黃芩二錢五分茯苓丸治妊娠阻病心中煩悶吐痰眩暈先服半夏茯苓湯二劑後服此藥赤茯苓人參桂心乾薑半夏湯泡七次炒黃橘皮各一兩白朮葛根甘草枳殼各二兩上為細末煉蜜為丸如梧桐子大每服五十丸米飲下日三服一方加麥門冬肘後加五味子集驗方療婦人妊娠惡阻嘔吐不下食青竹茹橘皮各三兩生薑茯苓各四兩半夏五兩上細切以水六升煮取二升半去滓分三服不瘥頻服忌羊肉飴鮓等物旋覆半夏湯治妊娠惡阻吐逆酸水惡聞食氣多臥少起旋覆花川芎細辛人參甘草炙各七分當歸半夏湯泡赤茯苓乾生薑陳皮各錢半水二盅姜五片煎至一盅不拘時服上諸方並用半夏蓋取其辛以散結氣瀉逆氣故嘔惡自止非專為痰設也樓全善曰大全方論半夏動胎而不用仲景方乃用之豫治妊娠阻病纍用未常動胎也經云有故無殞是也白朮散治惡阻吐清水甚者害十餘日水漿不入白朮一兩人參半兩丁香二錢半甘草一錢上為細末每服二錢水一盞姜五片煎七分溫服人參丁香散治妊娠惡阻胃寒嘔逆翻胃吐食及心腹刺痛人參丁香藿香葉各二錢半上為散每服三錢水一盞煎七分溫服不拘時醒脾飲治妊娠阻病嘔逆不食甚者中滿口中無味或作寒熱服之神效草豆蔻以濕紙裹灰中煨令紙干取出去皮用厚朴薑製各半兩乾薑一兩甘草一兩二錢半上為細末每服二大錢水一大盅棗二枚生薑三片煎八分去滓呷服病輕者只一兩服便能食上諸方與前茯苓丸並用丁香乾薑惟中寒脈遲者宜之人參橘皮湯治阻病嘔吐痰水人參橘皮白朮麥門冬各一兩甘草三錢厚朴白茯苓各五錢上為粗末每四錢加淡竹茹彈子大姜三片水煎竹茹飲妊娠惡食心中煩憒熱悶嘔吐青竹茹麥門冬各三兩前胡二兩橘皮一兩蘆根一握如體熱四肢煩熱加地骨皮一握上切細以水一大升煮半升去渣分兩服食前服上方用竹茹門冬蘆根皆氣涼而性和有熱無寒者通用之平劑也歸原散治妊娠惡阻嘔吐不止頭痛全不入食服諸藥無效者用此藥理血歸原則愈人參甘草川芎當歸芍藥丁香各半兩白茯苓白朮陳皮各一兩五錢枳殼去穰炒桔梗炒各二錢五分半夏湯洗七次炒黃一兩上㕮咀每服三錢生薑五片棗一枚水同煎安胎類丹溪云妊娠因火動胎逆上作喘者可用條芩香附之類夫黃芩乃安胎之聖藥俗人不知以為寒而不敢用謂監熱藥可以安胎殊不知胎前當清血養血則血循經不妄行故能養胎産後卻不可用黃芩産後宜大補氣血為主雖有雜症以末治之黃芩安胎乃上中下三焦降火下行之藥砂仁安胎乃血中之氣藥能治痛行氣阿膠安胎治血虛胎不安者用之安胎安胎有二法因母病以動胎但療母病而胎自安因胎不堅固致動以病母但療胎則母自瘥若偶然胎動不安腰痛者須進安胎藥二三服胎安止安胎飲治胎寒腹痛胸熱多驚舉重腰痛腹滿胞急或頓僕閃肭忽有所下或飲食毒物或感時疾往來寒熱致傷胎臟當歸枳殼炒各一兩半粉草炙一兩糯米二合熟地黃二兩川芎一兩五錢上銼每服四錢水盞半姜五片棗一枚加金銀少許同煎七分食前服虛弱加黃耆下血加炒阿膠下血不止加熟艾腹痛加白芷白芍藥減食加人參白朮固胎湯地黃川芎黃芩各五分歸身尾人參白芍藥陳皮各一錢白朮一錢半甘草三分黃柏炒少許桑上羊食藤圓者七葉糯米十四粒上㕮咀水煎服白朮散妊娠養胎主之白朮芎藭各一兩蜀椒七錢半炒出汗牡蠣半兩上四味杵為散酒服一錢匕日三服夜一服但苦痛加芍藥心下毒痛倍加芎藭心煩痛吐不能飲食加細辛一兩半夏大者二十枚服後更以醋漿水服之復不解者小麥汁飲之已後渴者大麥粥服之病雖愈服之不置二香散治妊娠胎動不安氣不升降飲食不美嘔吐酸水起坐覺重香附子一兩藿香葉甘草各三錢上為細末每服二錢不拘時沸湯調下順氣飲産前服之安胎紫蘇葉木香炮人參草豆蔻茯苓各一兩甘草半兩大腹子一兩如氣弱者不用上㕮咀每服三錢水一盞苧根三寸糯米少許煎至七分去滓溫服阿膠散治妊娠或因頓僕胎動不安腰痛腹滿或有所下或胎上搶心熟地黃二兩白芍藥艾葉當歸甘草阿膠黃耆各一兩一方有川芎上㕮咀每服半兩姜三片棗一枚水同煎服立效散治婦人胎動不定如重物所墜冷如冰川芎當歸各等分上為粗末稱三錢水煎食前溫服産寶方治妊娠無故胎重腹內絞痛煩悶當歸桑寄生各一兩川芎七錢半豉八合阿膠五錢蔥十四莖上水二升煮八合下膠煬溫分二服空心服養生必用治胎動方救急療胎動去血腰腹痛阿膠川芎當歸青竹茹各二錢上以水十盞內銀一斤煮至五盞去銀入上件藥三味煮至二盞半去滓入膠再煎膠煬分溫三服空