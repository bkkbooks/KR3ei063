body:
  text: 卷二發育論豫嘗謂男女受天地之全陽施陰化妙合自然猶春氣鼓蕩萬類一仲葭管之灰即枯荄磽土勾萌畢達所以然者得陰陽之和而成充氣之體也造物獨不全於人乎蓋由男精病於斫喪女血苦於阻遏日損日虧奚嗣之望故發育之理不蘄於人人自薪於發育耳是以男莫先於聚精精聚則神全神全則本立女莫先於調氣氣調則血附血附則經平二者既得其理發必中的而生育矣故云女不孕咎於經不調交不孕咎於精不射然未達鼓琴之說欲成音響者必先操縵以和其弦一有不調曲不成聲蓋亦以其不可偏勝也嗣育一端何以異此今人不歸咎於精血之不充而謂數奇之不偶皆不知本者也候時論袁了凡先生云天地生物必有氤氳之氣萬物化生必有樂育之時氤氳樂育之氣在人與物觸之而不能自止耳此天然之節候生化之真機也世人種子有云三十時辰兩日半二十八九君須算此特言其大概耳丹經云一月止有一日一日止有一時凡婦人一月經行一度必有一日氤氳之候於一時辰間氣蒸而熱昏而悶有欲交接不可忍之狀此的候也於此時逆而取之則成丹順而施之則成胎矣其曰三日月出庚又曰溫溫鉛鼎光透簾幃皆言其景象也當其欲情濃動之時子宮內有蓮花蕊者不拘經淨幾日自然挺出陰中如蓮蕊初開內人洗下體以手探之自知也但含羞不肯言耳男子預密告之令其自言一舉即中蓋女人月經方絶金水才生此時子宮正開乃受精結胎之候妙合而凝之時過此佳期子宮閉而不受胎矣交會旺相日春甲乙夏丙丁秋庚辛冬壬癸春秋冬常忌丙丁又摘玄云二月乙酉日午比首臥合陰陽生子必貴交會禁忌晦朔弦望虹霓地震日月薄蝕雷電霹靂大地晦冥大風大雨大霧大寒暑日月星辰之下神廟寺觀之中井灶圊廁之側冢墓尸柩之旁此時此地受胎非止百倍損於父母而所生之子亦必有盲聾喑啞頑愚殘疾夭折不仁不義不孝不悌之類矣可不慎歟可不慎歟孕成男女論男女之分亦皆有說月候方住一日三日五日交會者成男雙日者成女又云陰氣先至者成男陽氣先至者成女又云陰氣先至者成男陽氣先至者成女蓋陰陽配合二氣交感若陰血先至陽精後沖縱氣來乘血開裹精陰外陽內則成坎卦而成男若陽精先入陰血後參兩傍橫氣來助精開裹血陰內陽外則象離卦而為女故脈訣云夫乘妻兮縱氣露妻乘夫兮橫氣助子乘母兮逆氣參母乘子兮順氣護易曰乾道成男坤道成女乾坤陰陽之性情也左右陰陽之道路也男女陰陽之儀象也父精母血因感而會精之泄陽之施也血能攝之陰之化也精成其骨此萬物之資始於乾元也血成其胞萬物之資生於坤元也陰陽交姤胎孕乃凝胎之所居名曰子宮一系其下上有兩歧一達於左一達於右精勝其血及剛日陽時感者則陽為之主受氣於左子宮而男形成精不勝血及柔日陰時感者則陰為之主受氣於右子宮而女形成是知男女之分已定於萬物資始乾元之際陰陽交媾之時昧者不悟妄有轉女為男之法是不明感交之理矣受胎類素問云婦人足少陰脈動甚者妊子也又陰搏陽別謂之有子妊娠初時寸微小呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也候胎類凡婦人妊娠四月欲知男女遣妊人南行呼之左回首者是男右回首者是女蓋男胎在左則左重故回首時慎護重處而就左也女胎在右則右重故回首時慎護重處而在右也推之於脈其義亦然胎在左則血氣護胎而盛於左故脈亦從之而左疾為男左大為男也胎在右則血氣護胎而盛於右故脈亦從之而右疾為女右大為女也此男女不易之理神方驗胎散婦人三兩月月經不行疑是有孕又疑血滯心煩寒熱恍惚此藥可驗取之內也外有身病無邪脈以素問脈法推之十得八九矣真雀腦芎一兩當歸全用重一兩者只用七錢上為細末分作兩服濃煎好艾湯一盞調下或好酒服可待三兩個時辰間覺腹臍微動而頻即有胎也動罷即愈安穩無虞如不是胎即不動所滯惡物自行母亦安也如服藥不效再煎紅花湯調下必有神效又方三月後經血不行欲驗是胎用真川芎一兩細末濃煎艾湯空心調服覺腹中微動則有胎若在臍下動者乃血癥也不動者血病更看尺脈不止則是胎探胎散婦人胎氣有無疑惑之間以此探之有胎則吐無胎不吐皂角去皮甘草各一錢黃連半錢上為細末作一服溫酒調服養胎類婦人妊娠一月名始胚足厥陰脈養之二月名始膏足少陽脈養之三月始名胎手心脈養之四月始受水精以成血脈手少陽脈養之五月始受火精以成其氣足太陰脈養之六月始受金精以成其筋足陽明脈養之七月始受木精以成其骨手太陰脈養之八月始受土精以成膚革手陽明脈養之九月始受石精以成毛髮足少陰脈養之十月臟腑關節人神具備此其大略若細推之受胎在腹七日一變展轉相成各有生相今婦人墮胎在三月五月七月者多在二四六月者少臟陰而腑陽三月屬心五月屬脾七月屬肺皆在五臟之脈陰常易虧故多墮耳如昔曾三月墮胎則心脈受傷須先調不然至三月復墮昔曾五月墮胎則脾脈受傷至五月復墮宜先治脾惟有一月之內墮胎則人皆不知但知不受妊不知其受而墮也一月屬肝怒則墮多洗下體則竅開亦墮一次既墮則肝脈受傷他次又墮今之無子者大半是一月墮胎非盡不受妊也故凡初交之後最宜將息勿復交接以擾其子宮勿怒勿勞勿舉重勿使洗浴而多服養肝平氣之藥胎可固矣逐月養胎法北齊徐之才云妊娠一月名曰始胚飲食精熟酸美受御宜食大麥無食腥辛是謂才正禁忌針灸妊娠一月足厥陰脈養不可針灸其經即大敦行間太衝中封五里中郤等穴是也足厥陰內屬於肝肝主筋及血一月之時血行痞澀不為力事寢必安靜無令恐畏妊娠一月陰陽新合為胎寒多為痛熱多卒驚舉重腰痛腹滿胞急卒有所下當預安之烏雌雞湯烏雌雞一隻治如食法茯苓阿膠各二兩吳茱萸一升麥門冬五合去心人參芍藥白朮各三兩甘草生薑各一兩上㕮咀以水一斗二升煮雞取汁六升去雞下藥煎取三升內酒三升並膠煬化三升放溫每服一升日三服補胎湯若曾傷一月胎者當須服此細辛一兩防風二兩乾地黃白朮各三兩生薑四兩吳茱萸大麥各五合烏梅一升上八味㕮咀以水七升煮取二升半分三服先食服寒多者倍細辛茱萸熱多渴者去之加瓜蔞根二兩若有所下去大麥加柏子仁三合一方有人參二月養胎法妊娠二月名始膏無食辛燥居必靜處男子勿勞百節皆痛是為胎始結妊娠二月禁針灸妊娠二月足少陽脈養不可針灸其經如膽竅丘墟跗陽絶骨外丘陽陵泉等穴是也足少陽內屬於膽膽主精二月之時兒精成於胞里當慎護驚動也妊娠二月始陰陽踞經有寒多壞不成有熱即萎悴中風寒有所動搖心滿臍下懸急腰背強痛卒有所下乍寒乍熱宜服艾葉湯艾葉丹參當歸麻黃各二兩人參阿膠各三兩甘草一兩生薑六兩大棗十二枚上九味㕮咀以酒三升水一斗煮減半去滓內膠煎取三升分三服一方用烏雌雞一隻宿肥者治如食法割頭取血內三升酒中相和次以水一斗二升先煮取汁去雞內藥煎取三升內血酒並膠煎取三升分溫三服黃連湯若曾傷二月胎者當預服此黃連人參各一兩吳茱萸五合生薑三兩暴生地五兩一方用阿膠上五味㕮咀以酢漿七升煮取三升分四服日三夜一十日一修合若頗覺不安加烏梅一升加烏梅者不用漿直用水耳一方用當歸半兩三月養胎法妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲賢良端坐清虛是為外象而內感者也妊娠三月禁針灸妊娠三月手心主脈養不可針灸其經如中衝勞宮大陵內關間使郤門曲澤等穴是也手心主內屬於心毋悲哀思慮驚動妊娠三月為定形有寒大便青有熱小便難不赤即黃卒驚恐憂愁嗔怒喜頓僕動於經脈腹滿繞臍苦痛或腰背卒有所下宜服雄雞湯雄雞一隻治如食法黃芩白朮生薑各一兩麥門冬五合芍藥大棗十二枚擘甘草人參茯苓阿膠各二兩上㕮咀以水一斗三升煮雞減半出雞內藥煮取半內清酒三升並膠煮取三升分三服一日令盡當溫臥一方用當歸川芎各二兩不用黃芩生薑茯苓湯曾傷三月胎者當預服此茯神丹參龍骨各一兩阿膠當歸甘草人參各二兩大棗一十一枚擘赤小豆二十一粒上九味㕮咀以酢漿一斗煮取三升分四服先食服七日後服一劑腰痛者加桑寄生二兩深師有薤白二兩麻子一升四月養胎法妊娠四月始受水精以成血脈食宜稻粳羹宜魚雁是謂盛血氣以通耳目而行經絡妊娠四月禁針灸妊娠四月手少陽脈養不可針灸其經如關衝陽池內關三陽天井曲垣等穴是也手少陽內輸三焦四月之時兒五臟順成當靜形體和心志節飲食妊娠四月有寒心下慍慍欲嘔胸膈滿不欲食有熱小便難數數如淋狀臍下苦急卒風寒頸項強痛寒熱或驚動身軀腰背腹痛往來有時胎上迫胸心煩不得安卒有所下宜服菊花湯菊花雞子大一枚麥門冬一升大棗十二枚人參一兩半甘草當歸各二兩麻黃阿膠各三兩半夏四兩生薑五兩上十味㕮咀水八升煮減半內清酒三升並阿膠煎取三升分三服溫臥當汗以粉粉之護風寒四五日一方用烏雌雞一隻煮汁煎藥調中湯若曾傷四月胎者當預服此白芍藥生薑各四兩厚朴生李根白皮枳實白朮柴胡各三兩續斷川芎甘草各一兩當歸一兩半烏梅一升上十二味㕮咀水一斗煮取三升分四服日三夜一八日後復服一劑五月養胎法妊娠五月始受火精以成氣臥必晏起沐浴浣衣深其居處厚其衣服朝吸天光以避寒殃其食稻麥其羹牛羊和以茱萸調以五味是謂養氣以定五臟妊娠五月禁針灸妊娠五月足太陰脈養不可針灸其經如隱白大都公孫商丘三陰交漏谷陰陵泉等穴是也足太陰內輸於脾五月之時兒四肢皆成無太飢無甚飽無食乾燥無自灸熱無大勞倦妊娠五月有熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數卒有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲僕卒有所下宜服阿膠湯阿膠四兩人參一兩生薑六兩當歸芍藥甘草黃芩各二兩旋覆花二合吳茱萸七合麥門冬一升上十味㕮咀水九升煮藥減半內清酒三升並膠微火煎取三升半分四服日三夜一先食服便愈不瘥再服一方用烏雌雞一隻割取咽血內酒中以水煮雞汁煎藥減半內酒並膠煎取三升半分四服安中湯曾傷五月胎者當預服此黃芩一兩當歸川芎乾地黃人參各二兩甘草芍藥各二兩生薑六兩麥門冬一升五味子大麻仁各五合大棗三十五枚上十二味㕮咀水七升清酒五升煮取三升半分四服日三夜一七日後復一劑安胎當歸湯若妊娠五月舉動驚愕胎不安小腹痛引腰胳小便下血當歸阿膠炒川芎人參各一兩大麥十二枚艾葉一把上酒水各三升煮至三升內膠令煬分三服一方有甘草無參棗六月養胎法妊娠六月始受金精以成其筋身欲微勞無得靜處出遊於野數視走犬及視走馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背臀妊娠六月禁針灸妊娠六月足陽明脈養不可針灸其經如厲兌豐隆陰市三里上下廉等穴是也足陽明內屬於胃主其口目六月之時兒口目皆成調五味食甘美無大飽妊娠六月卒有所動不安寒熱往來腹內脹滿身體腫驚怖忽有所下腹痛如欲産手足煩疼宜服麥門冬湯麥門冬一升人參甘草黃芩各二兩乾地黃三兩阿膠四兩生