妊娠風壅咳嗽痰多喘滿百合蒸紫菀茸洗白芍藥赤茯苓去皮桔梗炒前胡各去蘆貝母去心各錢半甘草五分上水二盅姜五片煎至一盅不拘時服馬兜鈴散妊娠胎氣壅滯咳嗽急馬兜鈴桔梗人參甘草貝母各半兩陳皮去白大腹子桑白皮紫蘇各一兩五味子二錢半上㕮咀每服四錢姜三片水煎服麻黃散治妊娠外傷風冷痰逆咳嗽不食麻黃去節陳皮去白前胡各一兩半夏湯泡炒人參白朮枳殼炒貝母甘草各半兩上㕮咀每服四錢蔥白五寸姜三片棗一枚水煎服苦梗散治妊娠肺壅咳嗽喘急桔梗紫蘇人參桑白皮貝母甘草各半兩麥門冬去心赤茯苓各一兩麻黃七錢半每服四錢水二盅生薑三片煎一盅服又方貝母去心並皮炒黃為末砂糖拌勻丸如芡實大每服一丸噙化二冬飲嗽而痰中見紅歸身熟地黃天門冬麥門冬紫菀桑皮杏仁甘草桔梗黃芩五味子阿膠炒上水煎入小蘇汁同服有痰加竹茹一捻中惡類夫妊娠忽然心腹刺痛悶絶欲死者謂之中惡邪惡之氣中胎傷於人也所以然者血氣養勝而為精神之主若血氣不和則精神衰弱故邪毒之氣得以中之妊娠之病亦致損胎也當歸散治妊娠中惡心腹㽲痛當歸丁香川芎各三兩青橘皮二兩吳茱萸半兩去梗湯泡三次炒黑上為細末溫酒調一錢不拘時服補遺方治妊娠中惡心腹絞急切痛如鬼擊之不可按摩或吐血或衄血者用熟艾如拳大煮汁頻服又方用鹽一盞水二盞調和服以冷水噀之吐出即安中風類夫四時八方之氣為風也不從其令來者為虛邪賊害萬物人體虛則中之若風邪客於皮膚入於經絡即頑痹不仁若入於筋脈挾寒則攣急喎僻挾溫則弛縱若入臟腑則恍惚驚悸凡五臟俞皆在背臟腑虛寒邪皆從俞而入隨所傷臟腑經絡而為諸病妊娠中風若不早治則令墮胎也防風散洽妊娠中風卒倒心神悶亂口噤不能言四肢急強防風葛根桑寄生各一兩羚羊角屑細辛當歸甘菊花漢防己秦艽桂心茯神甘草炙各半兩上㕮咀每服八錢水一盅半生薑五片煎至一大盅去滓入竹瀝半合攪勻溫服無時防己散治妊娠中風口眼喎斜手足頑痹防己羌活防風麻黃去節黃松木節羚羊角屑各一兩桂心荊芥穗薏苡仁桑寄生甘草炙各半兩上㕮咀每服五錢水一盅半生薑五片煎至一大盅去滓溫服白殭蠶散治妊娠中風口噤心腸痰涎壅滯言語不得四肢強直白殭蠶炒天麻獨活各一兩麻黃去節兩半烏犀角屑七錢半白附子炮半夏湯洗七次薑製天南星炮藿香各半兩龍腦二錢半研上為細末入研藥令勻每服一錢生薑薄荷湯調下日三服赤箭丸治妊娠中風手足不隨筋脈緩急言語蹇澀皮膚不仁赤箭萆薢酒浸麻黃去節獨活鼠黏子熟地黃羚羊角屑各一兩阿膠炒防風川芎當歸炒薏苡仁五加皮秦艽漢防己去皮柏子仁酸棗仁炒丹參去蘆各錢半上為細末煉蜜和搗三五百下丸如梧子大每服三十丸豆淋酒送下食前服白朮酒治妊娠中風口噤語言不得白朮一兩半獨活一兩黑豆一合炒上細銼以酒三升煎取一升半去滓溫分四服口噤者拗口灌之得汗即愈又方治妊娠因感外風如中風狀不省人事熟艾三兩陳米醋炒令極熱以絹帛裹尉臍下良久即省子癇類妊娠體虛受風而傷太陽之經絡後復遇風寒相搏發則口噤背強名之曰痙又云痙其候冒悶不識人須臾自醒良久復作謂之風痙一名子癇亦名子冒甚則反張羚羊角散治妊娠冒悶角弓反張名曰子癇風痙羚羊角鎊獨活酸棗仁炒五加皮薏苡仁炒防風當歸酒浸川芎茯苓杏仁去皮尖各五分木香甘草炙各二分上姜水煎服羌活酒治妊娠中風痙口噤四肢強直角弓反張羌活兩半防風一兩黑豆一合炒去皮上二味㕮咀好酒五斤浸一宿每服用黑豆一合炒令熟投入藥酒一大盞候沸即住去滓分兩服灌之瘛瘲類瘛者筋脈急而縮也瘲者筋脈緩而伸也一縮一伸手足相引搐搦不已大抵與嬰孩發搐相似謂之瘛瘲也此證屬風風主搖動心火肝木風熱熾而為瘛瘲也鉤藤湯鉤藤鉤當歸茯神人參各一兩桑寄生半兩苦梗一兩半上為粗末每服五大錢水二盞煎至一盞去滓溫服無時忌豬肉菘菜若煩熱加石膏二兩半臨産月加桂心一兩眩暈類消風散治妊娠肝臟熱毒上攻太陽穴胞膈涎壅頭旋目暈或腮項腫核石膏煅防風羌活甘菊花川芎羚羊角鎊當歸酒浸大豆黃卷炒荊芥穗白芷各一錢炙甘草五分上作一服水二盅好芽茶半錢煎至一盅食遠服犀角散治妊娠諸風熱困倦時發昏眩犀角人參山梔仁羌活黃連青黛川芎吳白芷茯苓甘草各一錢炙上作一服水二盅生薑三片竹葉七葉煎至一盅食遠服驚悸類大聖散治妊娠怔悸睡里多驚腹脅膨脹坐臥不寧白茯苓麥門冬黃耆蜜炙當歸酒洗川芎各一錢半木香人參炙甘草各一錢上作一服水二盅生薑五片煎至一盅服竹葉湯治妊娠心驚膽怯終日煩悶白茯苓三錢防風麥門冬去心黃芩各二錢上作一服水二盅竹葉五片煎至一盅服竹茹湯療妊娠煩躁或胎不安用淡青竹刮茹一兩以水一大升煮取四合徐徐服安為度麥門冬湯治妊娠心驚膽怯煩悶麥門冬白茯苓防風各三錢人參一錢半上作一服水二盅生薑五片淡竹葉十片煎至一盅去滓服柴胡散治妊娠心煩頭目昏重心胸煩悶不思飲食柴胡兩半赤茯苓麥門冬各一兩枇杷葉去毛人參橘皮甘草各半兩㕮咀每服四錢水一盞姜三片煎七分服一母散治妊娠服藥致胎動氣不安有似虛煩不得臥知母二兩洗焙上為細末以棗肉為丸如彈子大每服一丸煎人參湯送下霍亂類飲食過度觸冒風冷陰陽不和清濁相干謂之霍亂其間或先吐或腹痛吐利是因於熱也若頭痛體疼發熱是挾風邪也若風析皮膚則氣不宣通而風熱上衝為頭痛風入腸胃則泄利嘔吐甚手足逆冷此陽氣暴竭謂之四逆妊娠患之多致傷胎也人參散治妊娠霍亂吐瀉心煩腹痛人參厚朴薑製橘紅各二錢當歸炒乾薑甘草炙各一錢作一服水二盅姜三片紅棗三枚煎至一盅服益智仁散治妊娠霍亂腹痛吐利不止白朮炒益智仁枳殼麩炒橘紅各七錢半草豆蔻煨去皮良薑炒各半兩上為散每服三錢水煎入姜半分去滓溫服木瓜煎治妊娠霍亂吐瀉轉筋入腹則悶絶吳茱萸湯泡七次生薑切各七錢半木瓜切一兩半一方有懷香七錢半甘草一錢茱萸半兩加紫蘇煎上細銼水二盞煎一盞二分去滓分三服熱服縮脾飲解伏熱除煩渴消暑毒止吐利霍亂之後服熱藥太多致煩躁宜沉井水中候冷頻服草果仁烏梅肉各三兩甘草二兩半上㕮咀每半兩水一碗姜十片煎八分沉冷服前方用乾薑豆蔻茱萸俱大溫之劑若發熱煩渴脈數陽證服之即死宜用後方竹茹湯治胃熱嘔吐乾薑三兩半夏湯洗七次薑汁半盞漿水一升煮耗一半取七錢半甘草七錢半上㕮咀每服五錢水二盅姜三片竹茹雞蛋大棗一枚煎至一盞去滓溫服益元散治症同前瘧疾類妊娠病瘧乃夏傷於暑客於皮膚至秋而發陽盛則熱陰盛則寒陰陽相雜寒熱俱作妊娠而作多傷於胎驅邪散治妊娠停食感冷發為瘧疾白朮草果仁高良薑炒縮砂仁橘紅白茯苓各一兩藿香葉一兩炙甘草五分上作一服水二盅姜五片棗一枚煎一盅服七寶散治一切瘧疾或先寒後熱或先熱後寒或寒多熱少或熱多寒少或一日一發或一日兩三發或日連發或間日發不問鬼瘧食瘧似瘧者並皆治之常山厚朴薑製青皮陳皮甘草檳榔草果去皮各等分㕮咀每服半兩於未發隔夜用水酒各一盞煎一大盞去滓露一宿再用酒水煎滓一次去滓亦露一宿來日當發之早燙溫面東先服頭藥少頃再服藥滓大有神效世醫妊娠瘧疾不用常山等藥故岐伯曰有故無殞何疑攻治痢疾類妊娠痢乃肝木克脾土宜平肝補脾若黃而兼白乃子令母虛須補脾胃若黃而兼黑是水反侮土矣必溫補脾胃若黃而兼赤乃心母益子但補子益氣若腸胃虛弱風邪客之或胎氣不安急補脾胃而自安矣黃連湯治妊娠下痢赤白膿血不止黃連一兩厚朴薑製阿膠炙當歸乾薑各兩半艾葉黃柏各一兩上為細末空心米飲調下方寸匕日三當歸芍藥散治妊娠下痢腹痛見前心腹痛立效飲治婦人胎前産後赤白痢生薑年少者百錢老者二百錢取自然汁鴨子一枚上將鴨子打破傾入薑汁內攪勻煎八分入蒲黃三錢再煎五七沸空心熱服立效丹鳳散妊娠下痢赤白絞刺疼痛雞子一枚烏雞者佳破孔頭出清苗黃用黃丹一錢入雞子殼內同黃攪勻以厚紙糊牢鹽泥固濟火上煨焙乾為細末上每服二錢米飲調下一服愈者是男二服愈者是女又方妊娠下痢腹痛小便澀當歸黃耆各一兩糯米一合上細切和水煎分四服挾熱方妊娠下痢黃連黃柏各一兩山梔仁二十枚上㕮咀每服五錢水二盞浸二時久煮十餘沸頓服若嘔加陳皮一兩半生薑三兩挾寒方妊娠白膿痢腹中冷乾薑四兩赤石脂六兩粳米一升炒黃上用水七升煎取二升溫分三服厚朴散治妊娠下痢黃水不絶厚朴姜炙三兩黃連三兩肉豆蔻一枚連皮用上為粗末水煮頓服水煮木香丸治久痢裡急後重日夜無度其效如神罌粟殼去穰殼三兩青皮去白甘草炒各二兩四錢訶子炮去核八兩當歸木香各六兩上為末煉蜜丸彈子大每服一丸水煎化空心服治臨産痢疾方用梔子燒灰末之空心熱水調下一匙甚者不過五服又方治胎前産後痢疾龜板一個醋炙末之米飲調下
