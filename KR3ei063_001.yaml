body:
  text: 卷一求子類胡氏曰男女交媾其所以凝結而成胎者雖不離乎精血猶為後天滓質之物而一點先天真一之靈氣萌於情欲之感者妙合於其間朱子所謂稟於有形之初而不能不粹養於真斫之後故醫之上工語男則以精言語女則以血言著方立論男以聚精為要女以調經為先而又參之補氣行氣之說察其脈絡究其虧盈而治之然後一舉可孕天下之男無不父女無不母矣男子聚精袁了凡先生云聚精之道一日寡欲二曰節勞三曰息怒四曰戒酒五曰慎味今之談養生者多言採陰補陽久戰不泄此為大謬腎為精之府凡男女交接必擾其腎腎動則精血隨之而流外雖不泄精已離宮未能堅忍者亦必有真精數點隨陽之痿而溢出此其驗也如火之有煙豈有復反於薪者哉是故貴寡欲精成於血不獨房室之交損吾之精凡日用損血之事皆當深戒如目勞於視則血以視耗耳勞於聽則血以聽耗心勞于思則血以思耗吾隨事而節之則血得其養而與日俱積矣是以貴節勞主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也怒則傷肝而相火動動則疏泄者用事而閉藏不得其職雖不交合亦暗流而潛耗矣是故當息怒人身之血各歸其舍則常凝酒能動血人飲酒則面赤手足俱紅是擾其血而奔馳之血氣既衰之人數月無房事精始厚而可用然使一夜大醉精隨薄矣是故宜戒酒內經云精不足者補之以味然釀郁之味不能生精惟恬淡之味乃能補精耳蓋萬物皆有真味調和勝而真味衰矣不論腥素淡煮之得法自有一段沖和恬淡之氣益人腸胃洪範論味而曰稼穡作甘世得之味惟五穀得味之正但能淡食穀味最能養精故曰慎味久而精聚神全陽氣自勝一往而孕育且壽葆真丸專治九醜之疾言莖弱而不振振而不豐豐而不循循而不實實而不堅堅而不久久而無精精而無子謂之九醜之疾此藥補十二經絡起陰發陽能令陽氣入胸安魂定魄開三焦積聚消五穀進食強陰益子精安五臟除心中伏熱強筋骨輕身明目去冷除風無所不治此藥平補多服常服最妙七十歲老人尚能育生非常之力治五勞七傷無子嗣者鹿角膠半斤銼作豆大就用鹿角霜拌炒成珠研細杜仲去粗皮切碎用生薑汁一兩同蜜少許拌炒斷絲三兩乾山藥白茯苓去粗皮人乳拌炒曬乾凡五七次熟地黃各二兩菟絲子酒蒸搗焙山茱萸肉各兩半北五味子牛膝去蘆用酒蒸益智仁去殼遠志泔水煮去骨小茴香青鹽三錢同炒破故紙川楝子去皮核取淨肉酥炙川巴戟酒浸去心已上各一兩胡蘆巴同故紙入羊腸內煮焙乾一兩柏子仁去殼另研如泥半兩川山甲酥炙沉香各三錢全蠍去頭足尾一錢五分上件各製為極細末以好嫩肉蓯蓉四兩酒洗淨去鱗甲皮垢開心如有黃白膜亦去之取淨二兩好酒煮成膏同煉蜜和前藥末搗千餘下丸如梧桐子大每服五十丸淡秋石湯溫酒任下以乾物壓之漸加至百丸服七日四肢光澤唇臉赤色手足溫和面目滋潤又能消食理脾輕身和氣語言清亮是其效也千金種子丹此方服之令人多子並治虛損夢遺白濁脫卸沙苑蒺藜取淨末四兩如蠶種同州者佳再以重羅羅二兩極細末二兩粗末用水一大碗熬膏伺候蓮鬚四兩極細末金色者固精紅色者敗精山茱萸用鮮紅有肉者去核制極細末淨三兩覆盆子去核取細末二兩雞頭實去殼取細末四兩龍骨五錢入砂鍋內煅通紅去火毒方用上用伏蜜一斤煉淨滴水成珠止用四兩將前五味重羅過先以蒺藜膏和作一塊再入煉蜜石臼內搗千餘下丸如豌豆大每服三十丸空心鹽湯送下忌欲事二十日此藥延年益壽多子不盡述聚精丸填實精髓助陰扶陽簡而神妙黃魚鰾膠白淨者一斤切碎用蛤粉炒成珠以無聲為度沙苑蒺藜八兩馬乳浸三宿隔湯蒸一炷香取起焙乾上為末煉蜜丸如梧子大每服八十丸空心溫酒白湯任下忌食魚及牛肉五子衍宗丸男服此藥添精補髓疒轉利腎氣不問下焦虛實寒熱服之自能平和古今種子祕方甘州枸杞子菟絲子酒蒸搗成餅各八兩遼五味子一兩覆盆子四兩酒洗去目車前子炒二兩共為細末煉蜜丸如梧桐子大每服空心九十丸上床時五十丸白沸湯或鹽湯送下冬月用溫酒送下修合日春取丙丁己午夏取戊己辰戌丑未秋取壬癸亥子冬取甲乙寅卯忌師尼鰥寡之人及雞犬六畜見之十子丸四明沈嘉則無子七十外服之連舉子槐用子和何首烏蒸七次覆盆子枸杞子去枯者及蒂桑椹子冬青子四味共蒸各四兩菟絲子去殼酒蒸柏子仁酒浸蒸沒石子照雷公制蛇床子蒸北五味子去枯打碎蜜蒸已上各二兩上為末煉蜜丸如梧桐子大每服五六十丸淡鹽湯下乾點心壓之調經類經候總論岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天謂天真之氣癸謂壬癸之水壬為陽水配丁而化水癸為陰水合戊而化火故曰水火者陰陽之徵兆也女子陰類故得癸焉沖為血海任主胞胎二脈流通經血漸盈應時而下天真氣降與之從事故曰天癸也常以三旬一見以象月盈則虧不失其期又名月信也若遇經行最宜謹慎否則與産後證相類若被驚恐勞役則血氣錯亂經脈不行多致癆瘵等疾若逆於頭面肢體之間則重痛不寧若怒氣傷肝則頭暈脅痛嘔血而瘰癧癰瘍若經血內滲則竅穴淋瀝無已凡此六淫外侵而變證百出犯時微若秋毫成患重如山嶽奚望其嗣哉且夫血者水穀之精氣也和調五臟灑陳六腑在男子則化為精在婦人上為乳汁下為血海故雖心主血肝藏血亦皆統攝於脾補脾和胃血自生矣凡經行之禁禁用苦寒辛散之藥飲食亦然凡婦人月水不調由風邪乘虛客於胞中而傷衝任之脈心脾平和則經候如常七情內傷六淫外侵飲食失節起居失宜脾胃虛損心火妄動則月經不調矣蓋血生於脾土而實統攝之故凡血病當用苦甘之劑以助陽氣而生陰血又經水者陰血也陰必從陽故其色紅稟火色也血為氣之配氣熱則熱氣寒則寒氣升則升氣降則降氣凝則凝氣滯則滯氣清則清氣濁則濁見有成塊者氣之凝也將行而痛者氣之滯也來復作痛者氣血俱虛也色淡者亦虛也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱之甚也今人但見紫者黑者作痛者成塊者率指為風冷而行溫熱之劑則禍不旋踵矣若夫外邪冷症初感入經必痛或不痛者久則鬱而變熱矣且寒則凝既行而紫黑者故非寒也故用藥當審其虛實寒熱而調血即兼調氣治無不愈如虛中有熱月事不來四物湯加芩常過期者血少也以芎歸參術與痰藥過期紫黑有塊作痛血熱也以四物湯加香附黃連過期色淡挾痰者二陳湯加芎歸紫黑色成塊者熱極也四物湯加黃連常不及期者血熱血滯也四物湯加芩連香附臨經將來作痛者四物湯加桃仁香附黃連血枯四物湯加紅花桃仁痰多占住血海地位因而下多者目必漸昏肥人有之以南星蒼朮川芎香附作丸服之肥人軀脂滿經閉者導痰湯加芎歸連不可服地黃蓋泥腸故也如用之以薑汁炒肥人子少亦由痰多脂膜閉塞子宮不能受入陽精而施化也宜服前藥瘦人子宮無血精氣不聚可用四物湯養血養陰等藥調經散月候不調或前或後服此調經成孕川當歸一兩酒洗麥門冬去心二兩半吳茱萸一兩去閉目沸湯七次人參一兩半夏一兩湯泡七次白芍藥一兩川芎一兩牡丹皮去心一兩肉桂一兩不見火阿膠炒成珠甘草各一兩上㕮咀每服三錢水一盞半生薑五片煎至八分食前稍熱服之審經多少婦人病多是月經乍多乍少或前或後將發疼痛醫家不審一例呼為經病不知陽勝陰陰勝陽所以服藥無效蓋陰氣勝陽則胞臟寒氣血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽乘陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前和血氣平陰陽當歸飲陽勝陰月候多者此抑陽助陰調理經脈當歸微炒地黃酒蒸焙川芎白朮白芍藥黃芩各等分每服三錢水一盞半煎八分空心溫服七沸湯陰勝陽月候少者治榮衛虛經水愆期或多或少腹痛當歸川芎白芍藥蓬朮熟地黃川薑木香各等分每服四錢水一盞半煎至八分溫服紫石英丸理其陰陽調其血氣使不相乘以平為期妙甚紫石英細研水飛川烏炮杜仲炒去絲禹餘糧煅醋淬遠志去心澤瀉桑寄生桂心龍骨另研當歸人參肉蓯蓉酒浸石斛乾薑炮五味子甘草炙各一兩牡蠣煅川椒去目炒去汗各半兩上為細末煉蜜丸如梧桐子大每服二十丸食前米飲湯下四物芩術湯經水過多為虛熱為氣虛不能攝血當歸川芎芍藥地黃黃芩白朮各等分上水煎服又經水過多為熱乃陰挾熱所致當補陰清熱黃芩炒芍藥炒龜板炙各一兩椿樹根皮七錢半黃柏炒三錢香附二錢半上為末酒糊為丸空心白湯下五六十丸四物葵花湯治經水澀少當歸地黃川芎芍藥葵花各一兩一方加紅花血見愁煎服又方治經水少而血和當歸川芎生地熟地芍藥各一兩先期後期王子享曰經者常候也謂候其一身之陰陽愆伏知其安危故每月一至太過不及皆為不調陰太過則先期而至陽不及則後時而來有乍多乍少斷絶不行崩漏不止皆由陰陽盛衰所致先期湯治經水先期而來宜涼血固經生地川歸白芍藥各二錢黃柏知母各一錢條芩黃連薑汁炒川芎阿膠炒各八分艾葉香附甘草炙各七分水二盅煎一盅食前溫服一方加人參五分過期飲治經水過期不行乃血虛氣滯法當補血行氣熟地黃白芍藥當歸香附各二錢川芎一錢紅花七分桃仁泥六分蓬莪朮木通各五分甘草肉桂各四分水二盅煎一盅食前溫服又方補血行氣當歸一錢半川芎五分熟地一錢白芍一錢桃仁二十個紅花五分香附一錢蓬朮一錢甘草五分蘇木一錢木通二分官桂五分白水煎空心服四物苓連丸治經水如黑豆汁當歸地黃川芎芍藥黃連黃芩各一兩上為末醋糊丸服溫經湯和劑治婦人血海虛冷月水不調川芎當歸芍藥蓬朮各一錢五分人參牛膝各一錢桂心牡丹皮各一錢甘草五分水二盅煎至一盅不拘時服滋血湯治婦人血海久冷滋養榮血當歸一錢半川芎麥門冬去心牡丹皮人參芍藥琥珀另研各一錢半夏曲官桂阿膠炒酸棗仁甘草各五分水二盅生薑三片煎一盅食前服薑黃散治血臟久冷月水不調臍腹刺痛薑黃白芍藥各二錢玄胡索牡丹皮當歸各一錢半蓬朮紅花桂心川芎各一錢上作一帖水一盅酒半盅煎一盅不拘時服秦艽丸治婦人極寒者秦艽桂心不見火杜仲薑汁炒斷絲厚朴各三錢乾薑炮沙參牛膝酒浸半夏湯泡各五錢生附子去皮臍茯苓一兩五錢人參一兩細辛一兩五錢上為末煉蜜為丸緑豆大空心醋湯米飲任下五十丸覺有孕即止無夫之婦不可服以其太熱也卷柏丸此藥養血潤燥治婦人衝任本虛血海不足不能流通經絡月水不調赤白帶下三十六種疾並皆治之常服和經絡暖五臟潤肌膚長髮去穜除風令人有子卷柏去根當歸酒洗焙艾葉炒各二兩熟地黃洗焙川芎白芷柏子仁微炒肉蓯蓉牡丹皮各一兩上為細末煉蜜和丸梧桐子大每服五十丸用溫酒或米飲送下空心食前服南嶽夫人濟陰丹治婦人血氣久冷無子及數墮胎皆因衝任之脈虛損胞內宿挾疾病經水不時暴下不止月內再行或前或後崩中漏下三十六疾積聚癥瘕臍下冷痛小便白帶已上諸疾皆令孕育不成此藥兼治産後百病百晬常服除宿血生新血令人有子亦生子充實並治男子亡血諸疾木香炮京墨煅茯苓桃仁去皮尖麩炒各一兩蠶布炮藁本秦艽石斛酒浸炒桔梗炒人參甘草各三兩牡丹皮乾薑炮細辛桂心當歸川芎各五錢蒼朮米泔浸八兩大豆卷炒半升川椒去目併合口炒出汗山藥各三兩澤蘭葉熟地黃酒浸烙干香附子炒各四兩糯米炒一升上為細末煉蜜丸每兩作六丸如彈子大每服一丸細嚼溫酒送下淡醋湯化服亦可空心食前服一方山藥川椒各三兩或以醋糊為丸如梧桐子大每服五十丸依前服亦可暖宮丸治衝任虛損下焦久冷月事不調不成孕育崩漏下血赤白帶下並皆治之生硫黃六兩赤石脂火煅海螵蛸大附子炮去皮臍各三兩禹餘糧九兩火煅醋淬上為細末醋糊為丸如梧桐子大每服三十丸空心用溫酒或醋湯送下啓宮散婦人肥盛者多不能孕育以身中有脂膜閉塞子宮以致經事不行瘦弱婦人不能孕育以子宮無血精氣不聚故也肥人無子宜先調理當歸一兩酒洗茯苓二兩川芎七錢半白芍藥白朮半夏湯洗香附米陳皮甘草各一兩作十帖每帖姜三片水煎吞後丸藥啓宮丸白朮二兩半夏曲川芎香附米各一兩神麯炒茯苓各半兩橘紅四兩甘草二錢以上共為末粥為丸每服八十丸如熱多加黃連枳實各一兩服前藥訖卻服後螽斯丸螽斯丸附子制茯苓各六錢厚朴杜仲桂心秦艽白薇半夏乾薑牛膝沙參各二錢人參四錢細辛五錢上為末煉蜜和丸如小豆大每服五丸空心酒下加至十丸不妨覺有娠三月後不可更服忌食牛肉馬肉則過月難産纍服神應正元丹調經種子香附一斤同艾三兩先以醋同浸一宿然後分開制之酒鹽酥童便各制四兩阿膠蛤粉炒二兩枳殼四兩半生用半麩炒淮生地酒洗熟地酒浸當歸身酒洗川芎炒各四兩白芍藥八兩半生半酒炒加白茯苓琥珀治帶上為末醋糊丸如梧桐子大空心鹽湯吞五六十丸寶嗣丸龐丞相夫人三十九歲無子服此藥十四日有孕後生九子男婦皆可服吳茱萸白及白蘞白茯苓陳皮各一兩細辛五錢桂心五味子各四錢白附子炒川牛膝厚朴制各三錢人參當歸乳香各一錢沒藥八分上十五味經盡後一日連進二服交會必有孕見效不可再服恐生雙胎大蕩胞湯治婦人全不産育及斷絶久不産三十年者乃汙血積冷宜服朴硝牡丹皮當歸大黃蒸一飯久桃仁去皮尖各三兩細辛厚朴薑汁製桔梗赤芍藥人參茯苓桂心甘草牛膝去蘆陳皮各二兩附子炮一兩半虻蟲去翅足炒焦水蛭炒枯各十枚上件以清酒五升水六合煮取三升分四服日三夜一每相去三時更服如常覆被少時取汗汗不出冬月著火籠必下積血及血冷赤膿如赤小豆汁本為婦人子宮內有此惡物或天陰臍下痛或月水不調為有冷血不受胎若斟酌下盡久弱大困不堪更服亦可二三服即止如大悶不堪可食酢飲冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著坐導藥坐導藥治全不産及斷續服前蕩胞湯惡物不盡用此藥皂角去皮子吳茱萸當歸各二兩細辛去苗五味子乾薑各一兩黃葵花白礬枯戎鹽蜀椒各半兩上為細末以絹袋大如指長三寸余盛藥令滿縛定納婦人陰中坐臥任意勿行走小便時去之更安一日一度易新者必下清黃冷汁若未見病出無間止可十日安下本為子宮有冷惡物故令無子值天陰冷則發疼痛須候病出盡方已不可中止每日早晚用蕒菜煎湯薰之一凌霄花婦人聞其氣不孕香附散婦人氣盛於血所以無子香附乃婦人之仙藥不可謂其耗氣而不服香附炒四兩茯神一兩陳皮二兩甘草一兩炙上為末每服二錢沸湯調服
