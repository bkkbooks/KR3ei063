body:
  text: 卷三大小便類夫妊娠大小便不通由臟腑之熱所致若大腸熱則大便不通小腸熱則小便不通大小腸俱熱則大小便俱不通更推其因而治之葵子湯治妊娠得病六七日以上身熱入臟大小便不利安胎除熱葵子二升滑石四兩碎上水五升煮取一升去滓盡服須臾下即愈又方利大腸葵子一合川朴硝二兩每服三錢水煎溫服六聖散妊娠大小便不通熱閉心膈腹脅脹悶妨害飲食大黃木通檳榔各一兩枳殼七錢半大腹子三個訶子四個去核半生半熟上為末以童便一盞蔥白二寸同煎至六分調下二錢車黃散車前子一兩大黃炒半兩上為細末每服三錢空心蜜湯調下大腹皮湯治妊娠大小便不通枳殼大腹皮赤茯苓各一兩甘草二錢上為末蔥白湯調下二錢吐血衄血咳嘔血類妊娠吐血者皆由臟腑有傷凡憂思驚怒皆傷臟腑氣逆於上血隨而溢心悶胸滿久而不已心悶甚者死妊娠病此多墮胎也必勝散妊娠血妄流溢吐血衄血嘔血咯血熟地黃小薊並根用人參蒲黃微炒當歸芎藭烏梅肉各一兩上各藥搗羅為粗散每服五錢水一盞半煎至七分去滓溫服又方治吐血不止馬氣勃用生布擦為末濃米飲調下又方治鼻血用白茅花濃煎汁服胎自墮類陽施陰化胎孕乃成血氣虛損不足營養其胎自墮或勞怒傷情內火便動亦能墮胎推原其本皆因於熱火能消物造化自然病原乃謂風冷傷於子臟而墮此未得病情者也濟生芎藭補中湯治懷孕血氣虛弱不能衛養以致數月而墮服此安全芎藭五味子阿膠蛤粉炒乾薑炮各一錢黃耆蜜炙當歸酒浸白芍藥白朮各錢半杜仲炒去絲人參木香不見火甘草炙各五分上作一服水二盅煎至一盅服阿膠湯妊娠數墮胎小腹㽱痛不可忍阿膠炙燥熟地黃焙艾葉微炒芎藭當歸切焙杜仲去粗皮炙銼白朮各一兩上每服四錢水一盞半棗三枚劈破同煎至八分去滓食前溫服杜仲丸治妊娠三兩個月胎動不安防其欲墮宜預服之杜仲薑製炒去絲續斷酒浸各二兩為末煮棗肉杵丸梧子大每服七十丸米飲下四制艾附丸治婦人數墮胎由氣不升降所以胎氣不固猶宜服此香附杵去毛淨一斤分四分一分酒浸一分醋一分童便一分鹽水各浸七日取去焙乾上為細末醋煮糊和丸梧子大每服七十丸空心溫酒下肥人只依本方瘦人加澤蘭葉赤茯苓各二兩刪繁方治妊娠數落而不結實或冷或熱百病之源甘草黃耆人參川芎白朮地黃吳茱萸各等分一方有乾薑當歸上為末空心溫酒調二錢忌菘菜桃李雀肉醋安榮湯治胎氣不固常得小産當歸地黃川芎芍藥阿膠黑香附白朮黃芩砂仁糯米水煎服安胎飲妊娠五七個月前有小産症者服此可保全産白朮一錢人參五分當歸一錢川芎五分熟地一錢白芍藥一錢陳皮五分甘草三分紫蘇二分炙黃芩五分上件薑三片水煎食前服若是八九個月內加大腹皮黃楊腦七個猶妙小産類夫妊娠日月未足胎氣未全而産者謂之半産蓋由妊娠衝任脈虛不能滋養於胎胎氣不固或跌撲閃墜致氣血損動或因熱病溫瘧之類皆令半産俗呼為小産小産不可輕視宜將養十倍於正産半産重於大産如栗熟自脫半産如生採破其皮殼斷其根蒂故半産肥肉皆腐爛當補其虛損生其肌肉益其氣血去其風邪養其臟氣故宜十倍正産將養人參湯治半産後血下過多心驚體顫頭目暈旋或寒或熱臍腹虛脹疼痛人參麥門冬去心焙生地黃焙當歸洗焙芍藥黃耆白茯苓去皮甘草炙各一兩上件每服三錢水一盞煎七分去滓食前溫服生地黃湯妊娠胎氣損動血氣不調或跌撲閃墜以致胎墮胎墮後惡滯不盡腹中㽱痛生地黃焙一兩大黃泡煨芍藥白茯苓去黑皮當歸切炒細辛去苗甘草炙黃芩桂去粗皮各半兩上㕮咀每服五錢水一盞半入生薑大棗拍碎同煎至一盞去滓服人參黃耆湯治小産氣虛血下不止人參黃耆炒當歸白朮炒白芍藥炒艾各一錢阿膠二錢上作一劑水煎服又方治妊娠損動下血不止甘草一兩炙阿膠二兩雞子一個上以水二大盞煮甘草一盞三分去滓下雞子膠候膠煬攪勻分三服丹參飲妊娠胎墮下血不止丹參十二兩細切酒五升煮取三升分三服止痛飲小産後心腹疼痛當歸川芎熟地黃白芍藥玄胡索桃仁紅花香附青皮炒黑澤蘭牡丹皮白水煎入童便酒各小半盞煎服當歸酒治墮胎後血不出當歸炙令香芍藥炒各二兩㕮咀每服三錢無灰酒一盞入生地黃汁一合銀器內慢火煎至七分去滓溫服惡血下為度羚羊角散小産後血不出小腹滿痛用羚羊角燒灰細研如面每服三錢不拘時以豆淋酒調下烏金散妊娠墮胎後惡血不下兼治諸疾血病好墨二兩折二寸挺子燒通赤用好醋一升淬七遍又再燒通赤放冷另研為末沒藥研麒麟竭各二錢半麝香一錢上為細末每服溫酒調下一錢匕如血迷心用童便加酒調下二錢豬膏飲治墮胎血不出上搶心疼痛煩憒豬膏七合白蜜三合生地黃切二兩上先將豬膏地黃相和煎令赤色去地黃內蜜膠攪勻溫分二服相次再服白蜜湯墮胎後惡血不出白蜜二兩生地黃取汁一盞酒半盞上汁與酒共入銅器中煎五七沸入蜜攪勻分兩服三劑百病可愈牛膝湯治胎墮胞衣不下當歸切炒牛膝酒浸切炒焙各兩半木通銼滑石研各二兩冬葵子炒二合瞿麥穗一兩上每服三錢水一盞半煎至七分去滓溫服未下再服以下為度澤蘭湯治墮胎胞衣不下澤蘭葉切研滑石末各半兩生麻油少許上水三盞先煎澤蘭至一盞半去滓入滑石末並油再煎三沸頓服之未下更服生羊飲治妊娠胎死腹中胞衣不下及産後卒有別病欲至狼狽刺熱羊血飲一小盞極效胎不長類妊娠不長者因有宿痰或失調理以致臟腑衰損氣血虛弱而胎不長也當治其痰疢益其氣血則胎自長矣安胎白朮散治妊娠宿有冷胎痿不長或失於將理傷胎多墮此藥補榮衛養胎氣白朮川芎各一兩吳茱萸湯泡半兩甘草炙一兩半為細末每服二錢食前溫酒調下忌生冷果實黃耆散主妊娠胎不長安胎和氣思食利四肢黃耆白朮陳皮麥門冬白茯苓前胡人參各七錢半川芎甘草各半兩上㕮咀每服三錢水一盞薑三片棗一枚煎至七分去滓溫服人參丸主妊娠胎不長宜服養胎人參白茯苓當歸柴胡刺薊厚朴桑寄生各一兩枳殼七錢半甘草半兩上為細末煉蜜丸如梧子大每服二十丸食前溫水吞下集驗良方治婦人懷胎不長鯉魚長一尺者去腸肚鱗以水漬沒內鹽及棗煮熟取汁稍稍飲之當胎所腹上當汗出如牛鼻狀雖有所見胎雖不安者十餘日輒一作令胎長甚平安日月未足欲産過期不産類婦人懷胎有七月八月而産者有至九月十月而産者有經一年二年乃至四年而後産者各依後法治之集驗知母丸治日月未足而痛如欲産者兼治産難及子煩知母不拘多少為細末煉蜜丸如雞頭大溫酒嚼下日三服槐子丸妊娠月數未足而似欲産腹痛者槐子蒲黃各等分為細末蜜丸梧子大溫酒下二十丸痛止為度治過期不産方生地當歸川芎芍藥香附桃仁枳殼縮砂紫蘇水煎服即生鬼胎類夫人臟腑調和則氣充實風邪鬼魅不能幹之若榮衛虛損則精神虛弱妖魅鬼精得入於臟狀如懷娠故曰鬼胎也雄黃丸治妊娠是鬼胎致腹中黑血散下腹痛雄黃細研鬼臼去毛莽草丹砂細研巴豆去皮心油獺肝炙令黃各半兩蜥蜴一枚炙黃蜈蚣一條炙黃上為細末蜜丸梧子大空心溫酒下二丸兩服當利如不利加至三丸初下清水次下蟲如馬尾狀無數病極者下蛇蟲或如蝦蟆卵雞子或如白膏或如豆汁其病即除延胡散治婦人鬼胎血氣不可忍方斑蝥去頭足炒延胡索炒各三錢上為細末再研如面溫酒調服半錢胎下為度補遺方治婦人鬼胎如抱一甕吳茱萸川芎秦艽柴胡殭蠶巴戟巴豆不去油芫花醋煮各二兩上為末煉蜜丸梧子大每服七丸蜜酒下即出惡物而愈上方俱犯毒物非鬼胎不可輕用孕癰類按孕癰即是腹內患癰立安散治孕癬立驗烏藥用五錢水一盞牛皮膠一片煎至七分溫服又方薏苡仁煮汁飲之子啼並腹內鐘鳴類是症子在母腹中臍帶上疙瘩兒含口中者因妊婦登高舉臂脫出兒口以此作聲一法用空房中鼠穴土或黃連濃煎汁飲之即止一法令妊婦曲腰就地如拾物狀仍入兒口即止孕婦腹內鐘鳴用鼠窟前後土為細末研麝香酒調二錢立愈臨産須知類臨月斷不可洗頭以免橫生逆産臨産月須要緊梳頭以候一月之後月數滿忌才覺腹痛驚動不可太早太早則大小霍亂信卜筮稱説神鬼多方恐怖則氣怯氣怯則上焦閉下焦脹氣乃不行致産不利犯此宜服紫蘇飲方見子懸條內外來間雜婦人喪孝穢濁等人預宜杜絶勿令觸犯胎氣致産不利産後客氣犯兒亦主害子未産一月以前忽然臍腹疼痛有如欲産仍卻無事是名試月非正産也但一切産母未有正産之候即不可令人抱腰産母亦不可妄亂用力蓋欲産之婦臍腹疼痛兒身未順收生之婦卻教産母虛亂用力兒身才方轉動卻被産母用力一逼使兒錯路忽橫忽倒不能正生皆由産母用力未當之所致也凡産母用力須待兒子順身臨逼門戶方始用力一送令兒下生此産母用力之當也若未有正産之候而用力傷早並妄服藥餌令兒生下譬如揠苗而助長無益有害凡十月未足臨産腹痛或止或作或痛不甚名曰弄痛非正産之候或腹痛甚而腰不甚者非正産之候胎高未陷下者非正産之候穀道未挺迸者非正産之候水漿未破血未出者非正産之候漿水雖出而腹不痛者非正産之候凡有正産候且令扶行熟忍如行不得或憑物坐之或安臥之或服安胎藥三服得安即止慎勿服催生藥餌愴惶令産母憂恐務令安心存養如覺心中煩悶可取白蜜一匙新汲水調下切勿妄亂用力先困其母直待子逼門戶腰至痛極眼中如火穀道挺迸時是正産方可用力並服催生藥正産十月滿足忽腰腹作陳疼痛相次胎氣頓陷至於臍腹痛極乃至腰間重痛穀道挺迸繼之漿破血出兒子遂生名曰正産凡催生妊婦欲産漿破血下臍腹作陳疼痛極甚腰重穀道挺迸已見正産之候兒卻未生即可服藥催之或有經及數日産母困苦已見正産之候但兒難生亦可服藥以助産母之正氣令兒速得下産當盛暑要令溫涼得所不可恣意取涼傷胎損氣亦不可人多熱氣逼襲産母使産母血沸而有發熱頭痛面赤昏昏如醉乃至不知人事荷葉散盛暑臨産三日發大熱其脈虛疾而大惡露不行敗血攻心狂言叫呼奔走拿捉不住乾荷葉生地黃牡丹皮濃煎湯調下生蒲黃二錢一服即定惡露即下遂安冬月天冷産母經血得冷遂凝以致兒不能生下此害最深若冬月産者下部不可脫去綿衣不可坐臥寒處當滿房著火常有暖氣令産母背身向火令臍下腿膝間常暖血得熱則流散使子易生羊肉湯寒入産門臍下脹滿手不可犯此寒疝當歸二錢生薑一兩精羊肉四兩陳皮半兩水三碗酒少許煎至二碗分二服或少入蔥鹽亦佳腹痛才作便謂生産坐婆疏狂不候時至便言試水試水並胞漿先破風入産門以致腫脹門戶狹小乾澀難産及産産母忍痛不肯舒伸行動曲腰眠睡胎元轉動尋至生門被遮閉又轉又尋至三胎已無力決主難産産母如覺飢餓可進以軟粥飯勿令飢渴恐致産時困乏無力若不飢渴不須強與飲食催生類大凡生産自有時候未見時候切不可強服催生滑胎等藥或勢不得已則服之凡服催藥必候腰痛甚胎陷下漿血破方可服切不可坐早及令坐婆亂動手大法用藥滑以流通澀滯苦以驅逐閉塞香以開竅遂血氣滯者行氣胞漿先破疲困者固血佛手散丹溪云催生只用此散最穩當又效捷川芎二兩當歸三兩上為細末每服二錢水一盞酒二分同煎七分溫服催生如聖散滑劑歌曰黃葵子炒七十粒細研酒調濟君急若遇臨危産難時免得全傢俱哭泣黃蜀葵子小半合一方二錢重研爛以酒濾去滓溫服神效或漏血胎干難産痛極者並進三服良久腹中氣寬胎滑即産須見正産候方可服之又方以香油白蜜小便和勻各半盞調前邊益母草末服又方治橫倒生者明阿膠炒滑石末各一兩葵子二兩上水一盞半煎至一盞去滓分二服催子柞木飲子苦劑治産難或橫或倒死胎爛脹腹中此方用之神效大柞木枝一大握長一尺寸銼洗淨生用甘草大者五十銼作五段上用新汲水三升半同入新磁瓶中以紙三重封緊文武火煎至一升半令香候産婦腰重痛欲坐草時溫飲一小盞腰未重痛勿服便覺心下開豁如覺渴再飲一盞至三四盞覺下重便生此方最穩最驗乳珠丹香劑用通明乳香研細以豬心血為丸梧子大硃砂為衣日乾每服一粒催生冷酒化下良久未下再服一粒若大段難産以蓮葉心蒂七個水二盞煎至一盞放溫化下一粒若久未下再服其驗如神如胎下胎衣不下者服此便下若胎橫逆不順即先服神應黑神散再服此藥催之合藥時要五月五日午時極妙又方通明乳香如皂角子大為末腰痛時新汲水一小盞入醋少許同煎令産母兩手捉兩石燕坐婆調藥飲水須臾坐草便生無痛楚神方開骨膏五月五日午時作乳香研細滴水丸如芡實大每服一粒酒吞下催生丹治産婦生理不順産育艱難或橫或逆十二月兔腦髓去皮膜研如泥母丁香一錢細末乳香二錢半另研麝香另研一錢上三味拌勻以兔腦髓和丸雞頭實大陰乾油紙裹每服一丸溫湯下即産兒手握藥出如意散臨産腰疼方可服之人參為末乳香各一錢硃砂二錢上同研臨産急用雞子清一個調藥末再用生薑自然汁調開冷服如橫倒等即時端順子母無恙易産天麻丸行血天麻即益母草六月間帶根花葉採曬乾不以多少為末煉蜜丸龍眼大臨産熱水嚼一丸能除産後百病如聖散專治孕婦難産紫蘇葉當歸各等分上㕮咀每服三五錢用長流水煎服如無流水以水順攪動煎服即下又方用紫蘇煎湯調益元散服之即産無憂散治胎胞氣逆臨蓐難産當歸酒浸川芎木香不見火白芍藥枳殼去白鹽炒甘草炙各一錢半乳香另研血餘燒存另研上作一服水二盅煎至一盅入乳香血餘和服固血催生方治胞漿先破惡水來多胎幹不下時先與四物湯當歸川芎地黃芍藥水煎服補養血氣次更濃煎蔥湯放冷令坐婆洗産戶須是款曲洗令氣上下通暢更用酥調滑石末塗産戶里久服神妙乳珠丹或葵子如聖散催生百靈散治逆産橫生疲胎百草霜香白芷不見火為末上二味等分研勻每服二大錢以童便並少米醋打為膏沸湯調下集驗用酒童便各半盞同煎才沸即熱服不過再服即産半夏湯破血治胎干而不能産半夏曲一兩半大黃五錢肉桂七錢半桃仁三十個微炒上為粗末先服四物湯一二服次服半夏湯薑三片水煎勝金散治難産逐敗血即自生順逆則轉正子死腹中則胎軟膨寬即産千金不授王不留行酸漿草死貽焙用茺蔚子白蒺藜去刺五靈脂行血宜生用各等分上為散每服三錢取利方水一盞半入白花劉寄奴子一撮同煎溫服大效至寶催生丸何首烏白色者二兩酒洗淨去皮搗碎乾末川烏四兩濕草紙裹煨取出去皮苗待草烏同制兩頭尖草藥勿認作鼠糞擦去黑皮淨二兩大當歸酒洗四兩草烏四兩先洗淨去黑毛同川烏俱切為片用無灰酒煮一日搗成餅曬乾為末前三烏俱不可犯鐵器蒼朮四兩米泔水浸去粗皮換酒浸切一宿刮去皮曬乾人參去蘆四兩桔梗甘草白芷白朮川芎天麻茴香麻黃防風荊芥已上各四兩木香細辛血竭各一兩上製為極細末煉蜜丸如栗子大每重二錢二分臨産紅花當歸煎酒化服如難産胞衣不下進三次服三丸即下如聖膏外取治産難並治胞衣不下兼治死胎萆麻子七粒去殼細研成膏塗腳心胞即下速洗去不洗腸出卻用此膏塗頂上腹自縮入萬金不傳遇仙丹萆麻子十四粒去殼硃砂研雄黃研各一錢半蛇蛻一尺燒存性一方萆麻子三粒上為末漿水飯為丸彈子大臨産時先用椒湯淋滌臍下次安藥一丸於臍中用蠟紙數重覆上闊帛束之頭生下急取去藥一丸可用三次立聖丹治産難危急者寒水石四兩生用二兩煅赤二兩上同研細入硃砂同研如深桃紅色每用三分井花水調如薄糊以紙花剪如杏葉大攤貼臍心候乾再易不過三上便産橫逆惡候死胎不下並治神驗神母散産難經日不生雲母粉半兩溫酒調服入口即産萬不失一神驗散治催生果效靈妙之理人所難通用實殊效臨産時令人路上尋破草鞋一隻取耳燒灰溫酒調下三錢匕得左足者男右足者女覆者死側者有驚果是神奇用此送催生丸猶妙交骨不開類交骨不開産門不閉皆由元氣素弱胎前失於調攝以致血氣不能運達而然也交骨不開者陰氣虛也用此湯主之加味芎歸湯川芎當歸各一兩自死龜板一個酥炙婦人發生男女勿者一握燒存性上為散每服五錢水煎約人行五里即生如胎死亦下灼過龜板亦可諸産逆類橫産治法橫産者兒先露手或先露臂此由産母未當用力而用之過也兒身未順用力一逼遂至身橫不能生下當令産母安然仰臥後令看生之入先推其手令入直止漸漸逼身以中指摩其肩推上之正之或以指攀其耳而正之須是産母仰臥然後推兒直上徐徐正之候其身正煎催子藥一盞吃了方可用力令兒下生此名橫産倒産治法倒産者産母胎氣不足關鍵不牢用力太早致令兒子不能回轉便直下先露其足當令産母仰臥令看生之人推其足入去不可令産母用分毫力亦不得驚恐使兒自順云蛇蛻散治妊娠欲産時不肯伸舒行動多曲腰眠臥忍痛兒在腹中不能得轉故腳先出謂之逆生須臾不救母子俱亡用烏蛇蛻一條蟬蛻十枚血餘一握用胎髮並燒灰存性研分二服溫酒調連進之仰臥少頃或用小線錢於兒腳心刺三五刺用鹽少許塗刺處即時順生母子俱活又方橫倒難生蛇蛻一條全者蠶故紙一張上二件皆入新瓦瓶中鹽泥固濟燒存性為末煎榆白皮乳香湯調下一錢二服出又方橫倒先露手足阿膠炒滑石一兩黃葵子一合酥一兩每服四錢水一大盞煎至一盞一二次服又方橫逆不順子死腹中伏龍肝即灶心多年土紅者佳上研細末溫酒調下一錢其藥兒頭戴出妙偏産治法偏産者兒身未正産母用力一逼致令兒頭偏拄左腿或偏拄右腿故頭雖露偏拄一畔不能生下當令産母仰臥次令看生之人輕輕推兒近上以手正其頭令兒頭頂端正然後令産母用力一送即便生下若是小頭頭後骨偏拄穀道只露其顱當令看生之人以綿衣炙溫裹手於穀道外方輕輕推兒頭令正便令産母用力送兒生下礙産治法礙産者兒身已順而露正頂不能生下蓋因兒身回轉肚帶攀其肩以此露正頂而不能生當令産母仰臥令看生之人輕推兒近上徐徐引手以中指按兒肩下扒其肚帶仍須候兒身正順方令産母用力一送使兒生下以二四産看生人非良手不可輕用坐産治法坐産者兒將欲生其母疲倦久坐椅褥抵其生路急於高處系一手巾令産母以手攀之輕輕屈足坐身令兒生下非坐在物上也盤腸産治法盤腸産者臨産母腸先出然後兒生産後其腸不收其法以盆著溫水盛其腸令産母仰臥與説不妨以安其心卻以好米醋半盞新汲水七分調勻噀産母面一噀一縮三噀收盡或背側打猛省而收又古方以萆麻子仁四十九粒研塗産母頭頂腸收上即急洗去其腸若干以磨刀水少許濕潤之內用磁石煎湯飲之即收上磁石須陰陽家用有驗者若以水濕母面恐驚則氣散又方産後腸不收香油五斤煎熱盛盆中候溫坐油盆中約一食時以皂角末吹入鼻中嚏作立上妙又方半夏為末搐鼻中則腸上矣又方以大紙捻蘸香油點燈吹滅以煙薰産母鼻中腸即收上又方腸出盛以潔淨漆器濃煎黃耆湯浸之腸即上又方用枳殼煎湯溫服良久即入子死腹中下死胎類産難子死腹中者多因驚動太早或觸犯禁忌致令産難胞胎已破無血養胎枯涸而死故也須驗産母舌若青黑其胎死矣當下之大法寒者熱以行之熱者涼以行之燥者滑以潤之危急毒藥下之熱劑烏金散治難産熱病胎死腹中或因顛仆或從高墜下或房室驚搐或臨産驚動太早觸犯禁忌或産時未到經血先下惡露已盡致胎乾子死身冷不能自出但視産婦面赤舌青是其候也面青舌赤母死子活唇青吐沫子母俱斃又有雙胎或一死一活其候難知臨時觀變濟生散熟地黃洗切焙乾酒炒真蒲黃大當歸交趾桂楊芍藥軍薑去皮粉草各一兩小黑豆四兩百草霜五錢上為末每服二錢半醋半合許沸湯六七分浸起溫服疑二之際且飲佛手散酒水合煎二三服探之若未死子母俱安若胎已死立便逐下的知其胎死進此藥後更服香桂散須臾如手推下香桂散下死胎桂枝三錢麝香當門子一個用研暖酒服須臾如手推下一方單用桂末一錢痛時童便調下名救苦散寒劑大腹子飲大腹子赤芍藥榆白皮各三兩當歸一兩炒滑石末七錢半瞿麥葵子炒茯苓粉草子芩各半兩上為粗末每服四錢水一盞煎七分去滓溫服朴硝散療死胎不出用朴硝半兩細研以溫童便調服屢效又方子死腹中不出用辰砂一兩水煮四五沸為末取酒調服立出滑劑千金方治子死腹中用葵子末酒服方寸匕若口噤不開格口灌之藥下即活又方療妊娠胎死腹中或母疾欲下胎榆白皮煮汁服三升回生飲子死腹中或半生不下或半著脊骨在草不産血氣上蕩母心面無顏色氣欲絶豬脂一斤白蜜一升淳酒二升上三味合煎取二升分為二服不能飲隨量服毒劑一字神散治子死胎不下胞破不生此方屢效救人無量鬼臼黃色者不拘多少去毛碾為末極細如粉不用羅以手指捻之上每服二錢用酒一盞同煎八分通口服神效雜方治生産不順胎死腹中胞衣不下臨産危急神龍散蛇退一條全者香油燈上燒研麝香少許上為末童便酒各半盞調一服即生下楊氏方療有孕月數不足子死腹中母欲悶絶取大豆一方黑豆三升醋煮濃汁二升頓服立效取死胎法用烏雞一隻去尾細切以水三升煮取二升去雞通手用衣帛蘸磨臍下胎自出又方子死腹中不出用黃牯牛糞塗母腹上立出熱佳一方以牛屎炒大熱入醋半盞經青布包於臍上下尉之立下牡丹丸生子下血過多子死腹中憎寒手指甲青面色黃黑胎上搶心悶絶欲死冷汗自出喘滿不食或食毒物或誤服草藥傷胎下血胎尚未損可安已死腹中即下胎死腹中危甚亦用牡丹皮白茯苓桂心桃仁赤芍藥上等分為末蜜丸彈子大每服一丸細嚼淡醋湯送下連進數丸千金神造湯妊有兩子一死一活服此死者出生者安蟹爪一升甘草三兩阿膠三兩上用東流水一斗先煮蟹爪甘草得三升去滓次入阿膠令煬頓服之不能盡分二三服若妊母困弱仰口納藥藥入即活藥用東向灶以葦薪煮之至穩方胎死不出以此下之先用平胃散以酒煮二服服之次研細朴硝二錢以童子小便調服即下霹靂奪命丹須至誠修合勿令婦人雞犬見蛇蛻一條入瓦罐內煅千里馬路上拾左腳舊草鞋洗淨燒灰一錢金銀箔各七片發灰二錢馬鳴退即蠶退燒灰一錢乳香半錢另研黑鉛三錢半溶開水銀七錢半共攪炒成研用上用豶豬心血丸如梧桐子大倒流水灌下二丸如灌不行化開灌救産後調養法凡生産畢飲熱童便一盞不得便臥且宜閉目而坐須臾上床宜仰臥不宜側臥宜堅膝未可伸足高倚床頭厚鋪茵褥遮圍四壁使無孔隙免致賊風及以醋塗鼻或用醋炭及燒漆器更以手從心擀至臍下使惡露不滯如此三日以防血暈血逆不問腹痛不痛有病無病以童便和酒半盞溫服五七服妙酒強行血亦不可多恐引血入四肢且能昏暈宜頻食白粥少許一月之後宜食羊肉豬蹄仍慎言語七情寒暑梳頭洗足以百日為度若血氣素弱不計日月否則患手足腰膝痠痛等證名曰褥勞最難治療初産時不可問是男是女恐因言語而滯氣或以愛憎而動氣皆能致病不可獨宿恐致虛驚不可刮舌恐動心氣不可刷齒恐致血逆須血氣平復方可治事不可在房煮粥煎藥動其虛熱犯時微若秋毫成病重如山嶽凡産後百日乃可會合不爾至死虛羸百疾滋長慎之凡婦人患風氣臍下虛冷莫不由此早行房故也産後七日內惡血未盡不可服湯候臍下塊散乃進羊肉湯産後調理類丹溪云産後以大補氣血為先雖有雜症以末治之産後一切不可發表産後戒用芍藥以酸寒伐生髮之氣也加味理元湯新産之後雖無疾故宜將息調理脾胃美飲食則臟腑易平復氣血自然和調百疾不生人參茯苓白朮甘草陳皮藿香縮砂仁黃耆各等分上銼散每服四錢薑三片棗一枚煎溫服四順理中湯治新産血氣俱傷脾胃不調百日內宜服人參乾薑炮白朮各一兩甘草炙半兩為細末上煉蜜丸如梧子大每服五十丸空心米飲下四味湯治産後一切諸疾才方分娩一服尤妙當歸心膈煩加半錢玄胡索氣悶喘加半錢血竭惡露不快加半錢沒藥心腹撮痛加半錢上等為細末每服二錢食前以童便一盅煎至六分溫服玉露散治産後乳脈不行身體壯熱疼痛頭目昏眩大便澀滯此藥涼膈壓熱下乳人參白茯苓甘草各半兩川芎苦梗炒白芷各一兩當歸二錢半芍藥七錢半上為細末每服二錢水一盞煎至七分溫服如煩熱甚大便祕者加大黃二錢半地仙煎治産後諸疾生地黃汁生薑汁各一升藕汁半升大麻仁三兩去殼研上和勻入銀器內慢火熬成膏溫酒調服半匙更以北術煎膏入半匙尤佳桃仁煎療産後百病諸氣桃仁一千二百枚去皮尖及雙仁熬令黃色上搗令極細以上等酒一斗五升同研三四遍如作麥粥法以極細為佳入小長頸瓷瓶中密塞以面封之納湯中煮一伏時不停火亦勿令火猛使瓶口常出在湯上勿令浸之候熱取出溫酒服一合日再服産後醋墨松煙細墨不拘多少用炭火煅通紅以米醋淬之再煅淬如此七度上研令極細用絹羅過才産了服二錢以産便調下琥珀散治産後一切危急之疾琥珀硃砂麝香香墨醋炙殭蠶當歸各二錢半鯉魚鱗炒焦桂心百草霜白附子梁上塵炒令煙出篩淨各半兩細末之炒生薑熱酒服二錢效千金增損澤蘭丸療産後百病理血氣補虛勞澤蘭甘草當歸川芎各一兩七錢半附子炮乾薑白朮白芷桂心北細辛各一兩北防風人參牛膝各一兩二錢半柏子仁熟地黃石斛各一兩半厚朴藁本蕪荑各五錢麥門冬去心二兩共為細末煉蜜如梧子大溫酒下二十丸黑神散治産後惡露不盡胞衣不下攻衝心胸痞滿或臍腹堅脹撮痛及血暈神昏眼黑口噤産後瘀血諸疾並皆治之又名烏金散治産後十八證一曰因熱病胎死腹中二曰産難三曰胎衣不下四曰血暈五曰口乾心悶六曰乍寒乍熱七曰虛腫八曰乍見鬼神九曰月內不語十曰腹痛泄瀉兼服止瀉調氣藥十一曰遍身疼痛十二曰血崩十三曰血氣不通咳嗽十四曰寒熱心痛月候不來十五曰腹脹滿嘔逆不定次服硃砂丸二三日炒生薑醋湯下七丸十六曰産後口鼻黑色起及鼻衄不可治十七曰喉中氣喘急死不治十八曰中風兼荊芥散熟乾地黃蒲黃炒當歸乾薑炮桂心芍藥甘草各四兩黑豆炒去皮半升上為細末每服二錢酒童便各半盞同煎服黑龍丹治産後一切血疾産難胎衣不下危急惡疾垂死者但灌藥得下無不全活當歸五靈脂川芎良薑熟地黃各一兩上細銼以沙合盛赤石脂泥縫紙筋鹽泥固濟炭火十斤煅令通赤去火候冷開看成黑糟色取出細研卻入後藥百草霜五兩硫黃乳香各一錢半花蕊石琥珀各一錢上五味並細研與前五味再研如法修制和勻以米醋煮糊丸如彈子大每服一丸炭火燒令通赤投於生薑自然汁與童便入酒漉出控干研細只用此酒調下胞衣不下類胞衣不下者母生子訖流血入衣中為血所脹故不得下治之稍緩腹脹滿以次上衝心胸疼痛喘急必致危殆急服奪命丹逐去衣中之血血散脹消胎衣自下又兒産出胎衣不落世謂之息胎由産初時用力比兒出體已疲憊不復能用力産胞經停之間而外冷乘之則血道澀故胞衣不出急須以方藥救治不妨於兒所奈者胞系連兒臍胞不出即不得以時斷臍浴洗冷氣傷兒即成病也舊法胞衣不出恐損兒者急宜斷臍帶以少物系墜系墜切宜用心先系然後截斷不爾則胎上掩心而死系墜則使其子血脈不潮入胞中則胞衣自當萎縮而下縱淹延數日亦不害人須令産母安心奪命丹附子半兩煨牡丹皮一兩乾漆二錢半碎之炒煙盡上為細末以釅醋一升大黃末一兩同熬成膏和藥丸如梧子大溫酒吞五七丸不拘時服花蕊石散治産後氣欲絶緣敗血不盡血迷血暈惡血奔心胎死腹中胎衣不下至死者但心頭暖急以童便一錢取下惡物如豬肝終身無血風血氣疾膈上有血化為黃水即吐出或小便中出若先下胎衣則泛泛之藥不能達若先治血悶則尋常之藥無此功無如此藥有兩全之妙花蕊石一斤上色硫磺四兩各細研上二味相拌令勻先用紙和膠泥固瓦罐子一個內可容藥候泥干入藥在內密泥封口了焙籠內焙令透熱安在四方磚上磚上書八卦五行字用炭一稱籠疊周匝自巳午時從下生火漸漸上撤有墜下火放夾火上直至經宿炭消火冷又放經宿冷定取出細研以絹羅至細瓷合內盛依法用之藭歸榆白湯治胎衣不下芎藭當歸焙各半兩榆白皮一兩銼上為細末每服三錢食前用生地黃汁同溫酒調下必效牛膝湯治胎衣不出臍腹堅脹急痛即殺人服此藥胞即爛下死胎牛膝瞿麥各四兩當歸三兩通草六兩滑石八兩葵子五兩上細切以水九升煮取三升分三服若衣不下服此藥衣即爛出千金急備丸治産後惡血衝心胎衣不下腹中血塊以錦紋大黃一兩為細末用釅醋半升同煎如膏丸如梧子大溫醋湯吞五丸或七丸須臾惡血即下愈下胎丸半夏白蘞各半兩上為細末丸如梧子大食後半夏湯下三十丸漸加至五十丸又方胎衣不出若腹脹則殺人黑豆三合炒令熟入醋一盞煎三五沸去豆分三服酒煮亦可廣濟治胎衣不出方用灶突中土三指撮以水服之又方雞子一枚苦酒一合和飲之立出又方紅花一兩酒煮濃汁服又方皂角刺燒為末每服一錢溫酒調下一法欲産時先脫所著衣以籠灶既易産胞衣易下一法取夫單衣蓋井上立出血暈附厥逆類産後血暈者由敗血流入肝經眼黑花頭目旋暈不能起坐甚致昏悶不省人事謂之血暈細酒調黑神散最佳庸醫或作暗風中風治之誤矣凡血暈熱乘虛逆上湊心故昏迷不省氣閉欲絶是也其由有三有用心使力過多而暈有下血多而暈有下血少而暈暈雖不同治當詳審下血多而暈症但昏悶煩亂宜補血清心藥下血少而暈乃惡露不下上搶於心心下滿急神昏口噤絶不知人當用破血行血藥郭稽中論産後氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花極甚者令人悶絶不知人口噤神昏氣冷醫者不識呼為暗風若作此治病必難愈宜服清魂散即愈清魂散表澤蘭葉人參各二錢半川芎半兩荊芥一兩一方有甘草二錢上為末用溫酒熱湯各半盞調一錢急灌之下咽眼即開氣定即醒保命荊芥散治産後風虛血暈精神昏昧荊芥一兩三錢桃仁炒五錢上細末熟水下三錢微喘加杏仁炒甘草各三錢又方産後血暈神妙用荊芥穗為末童便調下二三錢上荊芥利氣虛人不可服來蘇散里治臨産用力太過氣血暈悶不省人事木香不見火神麯炒陳皮去白白芍藥阿膠蛤粉炒麥糵炒黃耆去蘆生薑炒黑各一錢糯米一撮苧根洗淨一錢半甘草炙半分上作一服水二盅煎至一盅斡開口灌下即愈歸元湯治産後去血過多血暈不省川芎當歸各等分上作一服水二盅煎至七分食前服腹中刺痛加白芍藥口乾煩渴加烏梅麥門冬發寒熱加白芍水停心下加茯苓生薑虛煩不得眠加人參竹葉廣濟方治産後血暈心悶不識人神言鬼語氣急欲絶芍藥甘草各一兩丹參七分半併為㕮咀生地黃汁一斤生薑汁白蜜各二合上水二升先煎前藥取八合下二汁及蜜和勻分兩服又方産後余血攻心或下血不止心悶面青身冷氣欲絶新羊血一盞飲之妙日三服又方産後忽冒悶汗出不識人者暴虛故也破雞子三枚吞之便醒若未醒可與童便一升甚驗若産後去血多者又增此疾與雞子不醒者可急作竹瀝汁一服五合須臾不定再與五合頻與三五服瘥獨龍散下血少而暈者宜破血行血婦人産後血暈此乃虛火載血漸漸暈將上來用鹿角燒灰出火毒研極細用好酒童便調灌下一呷即醒此物行血效單行散治産後血暈昏迷不省衝心悶絶五靈脂二兩半生薑炒為細末每服二錢溫酒調下口噤者拗開口灌之入喉即愈一方加荊芥為末童便調服如崩不止加當歸酒童便煎不拘時服復生散治下胎或血上衝心已死用鬱金燒存性為末二錢濃醋一合調灌活奪命散治産後血暈血入心經語言顛倒健忘失志及産後百病沒藥血竭各等分上研細為末才産下便用童便細酒各半盞煎一兩沸調下二錢良久再服其惡血自循下行更不衝上免生百疾白湯調下亦可保命紅花散治産後血昏血暈血崩及月事不勻遠年乾血氣乾荷葉牡丹皮川當歸紅花蒲黃炒各等分上細末每半兩酒煎和渣溫服如胎衣不下榆白皮湯調下半兩花蕊石散治産後氣欲絶惡血奔心欲死者但以童便調一錢服之取下惡物為妙見胎衣不下又方治産後血暈心悶亂恍惚如見鬼生益母草汁三合如無根亦可生地黃汁二合童便一合雞子清一枚上前三味煎三四沸後入雞子清攪停作一服張氏方治産後血暈全不省人事危極者上切韭菜入有嘴瓷瓶內煎熱醋沃之便密系瓶口以瓶嘴向産婦鼻孔令醋氣透入須先扶病人起坐惡血衝心故有此症韭能去血中之滯血加以醋氣運達之用無不效血不下類夫惡露不下者由産後臟腑勞傷氣血虛損或胞絡挾於宿冷或産後當風取涼風冷乘虛而搏於血血壅滯不宣積蓄在內故令惡露不下也芍藥散療産後三四日惡露不下芍藥十分知母八分生薑當歸蒲黃各四分紅花二分荷葉中心蒂七枝生地黃汁二合上細切以水二升煎至七合去滓服荷葉散療産後惡露不下腹中疼痛心神煩悶乾荷葉二兩鬼箭羽桃仁劉寄奴蒲黃各一兩上為粗末每服三錢以童便一大盞薑二片生地黃一錢搗碎同煎至六分去滓無時熱服沒藥丸治産後惡露方行而忽然斷絶驟作寒熱臍腹百脈皆痛如錐刺非常此由冷熱不調或思慮動作氣所壅遏血蓄經絡當歸一兩桂心芍藥各半兩桃仁去皮尖炒研沒藥研各二兩半虻蟲去足翅炒水蛭炒焦各三十枚上為末醋糊丸如豌豆大醋湯下三丸千金保産方治婦人惡血不下當歸炒芫花炒等分上為細末每服三錢酒下又方用好米醋淬末以童便酒下妙黑龍丸見前蒲黃散治産後血不下蒲黃三兩水三升煮取一升頓服血不止類夫産後惡露不絶者由産後傷於經血虛損不足或分解之時惡血不盡在於腹中而臟腑挾於宿冷致氣血不調故令惡露淋瀝不絶也川芎芍藥湯虛者補之治産後血崩眩暈不知人事川芎芍藥當歸各等分上㕮咀每服四錢水盅半煎至七分去滓熱服又方療産後七八日惡露不止敗醬草當歸各六分芍藥續斷各八分川芎竹茹各四分生地黃炒乾十二分上細銼以水二升煮取八合空心頓服神功散熱者清之治産後亡血過多心腹微痛然後血下久而不止亦治赤白帶下年深諸藥不能療者貫衆狀如蝟刺者一個全用只揉去毛花蔓用之不銼斷上用好醋蘸濕慢火炙令香熱候冷為細末米飲調下二錢空心食前服千金獨聖方陷下者舉之治産後惡血不盡或經月半歲者升麻三兩清酒五升煮取二升半分溫再服牡蠣散脫者澀之治産後惡露淋瀝不絶心悶短氣四肢乏弱頭目昏重煩熱不思飲食面黃體瘦牡蠣煅川芎熟地黃白茯苓龍骨各一兩續斷當歸艾葉酒炒人參五味子地榆各半兩甘草二錢半上為末每服二錢水一盅生薑三片棗一枚煎至六分去滓食前服豆淋酒汙血産後猶有餘血水氣者黑豆五升熬令煙盡於瓷器內以酒一斗淬之蓋豆淋酒治汙血又能發表也廣濟神方治産後惡血不絶崩血不可禁腹中絞痛氣息急治蓐中三十六疾亂髮燒存性一兩阿膠二兩代赭石乾薑各二兩馬蹄殼一個燒乾地黃四兩牛角䚡五兩醋炙上為細末煉蜜丸如梧子大每服三四十丸空心米飲日二服祕録治胎落下血不止桑木中蠹蟲燒末酒服方寸匕日二服心痛類産後心痛為陰血虧損隨火上衝心絡名曰心胞絡痛宜大岩蜜湯治之若傷寒心痛名曰真心痛朝發夕死夕發朝死無藥所救大岩蜜湯生地黃當歸獨活吳茱萸芍藥乾薑甘草桂心小草各一兩細辛半兩上為散每服半兩水三盞煎一盞去滓稍熱服七氣手拈散治産後心氣攻痛玄胡索小茴香白芍藥乾漆炒枳殼各二兩黃連石菖蒲香附子蘇葉各一錢半沒藥乳香各一錢甘草六分上銼散分用二服每服用水一盞半薑三片煎至七分空心服失笑散治心腹痛欲死百藥不效服此頓愈五靈脂蒲黃各等分上為末先用釅醋調二分熬膏入水一盞煎七分食前熱服良驗腹痛類産後小腹作痛俗名兒枕塊兒枕者因母胎中宿有血塊因産時其血破散與兒俱下則無患矣若産婦臟腑風冷使血凝滯於小腹不能流通則令結聚痛疼名之曰兒枕也延胡索散治産後兒枕腹痛延胡索當歸各一兩真琥珀蒲黃炒各二錢半赤芍藥半兩桂心半兩紅藍花二錢上為細末以童便合酒溫溫調三錢食前服又方産後三日血塊痛發熱五靈脂略炒牡丹皮沒藥滑石上研細分五帖豆淋酒調之食前服失笑散行散之見心痛四汁飲治血瘕痛無定處童便三升生地黃汁生藕汁各一升生薑汁二升上先煎三味約三分減二次下薑汁慢火煎如稀餳每取一合溫酒調下黑神散治産後血塊痛經行腹痛經脈不調熟地黃一斤陳生薑半斤上二味同和炒乾為末每服二錢烏梅湯調下常服酒調經脈不通烏梅荊芥酒調下山楂飲用山楂濃煎汁入砂糖少許再煎熱服當歸血竭丸治婦人産後惡露不下結聚成塊心胸痞悶及臍下堅痛當歸血竭芍藥蓬朮炒各二兩五靈脂四兩上細末醋糊為丸梧子大每服五十丸食前溫酒送下産寶方産後血下不盡腹中痛無計青木香當歸牛膝川芎黃耆芍藥各八分大黃十三分浸芒硝十二分細切水七升煮二升半入大黃更三沸分三服金匱方産後腹痛煩滿不得臥枳實炒令黑勿太過芍藥各等分上二味杵為散服方寸匕日三服並生癰膿以麥粥下之千金桃仁散治産後腹痛桃仁半升芍藥川芎當歸桂心乾漆碎熬甘草各二兩細切水八升煮二升半分三服脅脹痛類産後兩脅脹滿氣痛由膀胱宿有停水因産後惡露下不盡水壅痞與氣相搏積在膀胱故令脅肋脹滿氣水相擊故令痛也經效方治産後血氣脹脅肋痛當歸十二分芍藥苦梗檳榔枳殼各八分桂心青木香柴胡各六分上㕮咀以水二升煎取八合去滓空心分溫二服當歸散治産後腹痛脅肋脹滿當歸乾薑等分上為末每服三錢水一盞煎八分入谷醋少許食前熱服選勝方産後惡露不下血氣壅痞脅肋脹痛不食蘇木紫葛各十二分芍藥當歸各八分桂心蒲黃各六分生地黃汁三合上㕮咀以水二升煎取七合下蒲黃分兩服又方理血氣煩悶脅肋脹滿及痛芍藥八分蒲黃延胡索各四分當歸六分荷葉蒂炙三十分上水二升煎取七合後入蒲黃空心分作兩服腰痛類腎主腰腳産後腰痛者為女人腎位系胞産則勞傷腎氣損動胞絡虛未平復而風冷客之冷氣乘腰故令腰痛也千金大豆酒産後中風腰背強痛煩熱苦渴頭身皆重此因風冷及傷寒所致用大豆五升炒令煙出以酒一升投之密蓋令溫去豆服一升日夜數服臥取微汗避風有加羌活服尤妙救急方療婦人産後余血不盡血流入腰腳疼痛胞滿氣急兩脅痛生薑一斤淡竹葉一斤切上二味以水二升煮取一升去滓分溫二服廣濟方治産後虛冷血氣流入腰腿痛不可轉敗醬當歸各八分川芎桂心芍藥各六分上㕮咀水二升煮取八合分溫二服忌蔥當歸黃耆湯治産後腰痛不可轉側自汗壯熱身體強氣短黃耆芍藥各二兩當歸三兩上銼每服四錢薑四片水煎溫服頭痛類頭者諸陽之會也産後五臟皆虛胃氣虧弱飲食不充穀氣尚乏則令虛熱陽氣不守上湊於頭陽實陰虛則令頭疼也川芎散行氣治産後頭痛真天台烏藥皮大川芎等分上為細末每服三錢燒紅稱錘淬酒調服二奇散行血治同前當歸川芎上為細末每服二錢水一盞煎七分溫服加減四物湯治産後頭痛血虛痰癖寒厥皆令頭痛蒼朮一兩六錢羌活川芎防風香附炒白芷各一兩石膏二兩半細辛一兩當歸甘草各半兩上粗末每用一兩水煎不拘時服如有汗知氣弱頭痛也方中加芍藥三兩桂一兩半生薑煎如痰癖頭痛加半夏三兩茯苓一兩生薑煎如熱痰頭痛加白芷三兩石膏三兩知母一兩如寒厥頭痛加天麻三兩附子一兩半生薑三片煎遍身疼痛類産後百節開張血脈流散遇氣弱則經絡肉分之間血多流滯纍日不散則骨節不利筋脈急引故腰背不得轉側手足不得動搖身熱頭痛醫以傷寒治之則汗出而筋脈動搖手足厥冷變生他病趁痛散産後氣弱血滯遍身疼痛及身熱頭痛牛膝當歸桂心白朮黃耆獨活生薑各半兩甘草薤白各二錢半上㕮咀每服半兩水二盞煎一盞半去滓食前服又方治産後遍身青腫疼痛及衆疾牛膝大麥糵各等分上為細末以新瓦罐中填一層麥糵一層牛膝如此填滿用鹽泥固濟火煅通紅放冷研為散但是産後諸疾熱酒調二錢下中風類産後中風者由産時傷動血氣勞損臟腑未曾平復起早勞動致令氣虛而風邪乘虛入之故中風風邪客於皮膚經絡但痛痹羸乏少氣筋脈挾寒則攣急喎僻挾濕則縱緩虛弱若入諸臟恍惚驚悸隨所傷腑臟經絡而治防風湯治産後中風背項強急胸滿短氣防風獨活葛根各五兩當歸人參白芍甘草炙各二兩上為㕮咀每服八錢水二盞半棗子二枚劈破同煎至一盞去滓溫服經效茯苓湯治産後風虛頭痛語言謇澀茯苓防風乾葛各八錢麥門冬去心一兩芍藥黃芩各六錢犀角屑四錢甘草炙二錢上㕮咀每服一兩水一大盞半煎一盞去渣溫服云岐方治産後中風半身手足不遂言語謇澀恍惚多忘精神不定獨活當歸芍藥防風川芎玄參天麻各五錢桂心三錢上㕮咀以水八升煮取二升半分為三服覺效更作一劑又作丸每服二十丸如有熱加葛根五錢有冷加白朮五錢若有氣症加生薑一兩半若手足不遂加牛膝一錢半萆薢三錢黃耆四錢若腹痛加當歸芍藥各七錢半若不食加人參五錢玄參一兩若寒中三陰所患必冷小續命湯加生薑煎若暑中三陽所患必熱小續命湯去附子減桂心一半加薄荷煎保命血氣湯治産後諸風痿攣無力秦艽羌活防風白芷川芎芍藥當歸白朮茯苓熟地黃各等分上為末一半蜜丸一半散酒調下五七十丸妙華他愈風散治婦人産後中風口噤手足瘛瘲如角弓或産後血暈不省人事四肢強直或心眼倒築吐瀉欲死用荊芥穗微炒為末每服三錢豆淋酒調服或童便服之口噤則挑齒灌之齦噤則灌入鼻中其效如神大抵産後大眩則汗出而腠理疏易於中風也乾葛湯療産後中風口噤不能言獨活二兩乾葛一兩半甘草炙半兩生薑一兩二錢半上㕮咀每服一兩水二大盞煎一大盞去滓溫服天麻散治産後中風口噤天麻七錢半白附子炮天南星炮半夏湯洗七遍去滑薑製乾蠍炒各半兩上為細末每服一錢生薑薄荷酒調下斡開口灌當歸散治婦人産後中風牙關緊急不省人事口吐涎沫手足瘛瘲當歸荊芥穗各等分上為細末每服二錢水一盞酒半盞煎一盞灌之如牙關緊急斡開微微灌之但下咽即生屢用救人大有神效羚羊角散治産後中風身體反張羚羊角屑當歸各七錢半獨活防風麻黃去節各一兩人參赤芍藥細辛桂心各半兩上㕮咀每服八錢水一大盞半生薑五片煎至一大盞去滓溫服羌活防風散中風口噤四肢痹麻不仁或角弓反張羌活防風二兩大烏豆一升炒上以酒五升先浸二味經宿大豆乘熱投中攪勻密封一日以湯煮瓶良久服八合覆衣取汗略略卻急速以豆淋酒服之即愈
