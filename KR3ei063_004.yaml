乾薑各一兩厚朴制兩半上為粗末每服三錢水煎服附子散療産後霍亂不止手足厥冷附子炮白朮當歸吳茱萸洗桂心人參丁香橘紅甘草各半兩上為細末每服二錢粥飲調下龍肝散吐逆不受湯藥以伏龍肝細末三錢米湯調下即受嘔吐類夫胃為水穀之海水穀之精以為血氣榮潤臟腑因産傷動臟腑有時氣乘腸胃腸胃燥澀其氣則逆故嘔逆不下食也開胃散治産後胃氣不和嘔吐不止全不納食宜服此藥訶子肉一兩半人參一兩甘草半兩上三味為細末別以半夏半分生薑一分薤白二七莖水一大盞煎至六分去滓分為兩服立效方療産後嘔逆不止橘皮一兩半夏曲甘草各半兩藿香三兩上為細末每服二錢水一盞半姜三片煎六分溫服石蓮散治産後咳逆嘔吐心怔目暈石蓮子去殼一兩半白茯苓一兩丁香五錢上為細末米飲調三錢無時服又方內熱嘔吐服前藥不效枇杷葉去毛蜜炙茅根各五錢煎濃湯入蘆根汁半盞和勻服吃逆類肺主氣五臟六腑俱稟於氣産後氣血臟腑俱傷而風冷搏於氣氣則逆上脾虛聚冷胃中伏寒因食熱物冷熱氣相沖擊使氣逆而不順則吃逆也丁香散治産後心煩咳噫不止丁香白豆蔻仁各半兩伏龍肝一兩上為細末煎桃仁吳茱萸湯調下一錢如人行五里再服石蓮散見嘔吐産寶方療産後吃逆三日不止欲死方桂心半兩薑汁三合上同煎取三合以大火炙手摩背熱時塗藥汁盡妙羌活散治吃逆羌活附子炮蘹香炒各半兩木香白姜炮各二錢半上五味為末每服二錢水一盞鹽一捻煎十數沸熱服一服即止又方治産後吃逆用乾柿一個切碎以水一盞煎六分熱呷之咳嗽類肺主氣産後血虛肺經一感微邪便成咳嗽或風或熱或寒或濕皆令咳嗽也若産後吃鹽太早而咳嗽者難治旋覆花湯治産後傷風寒喘咳嗽痰涎壅盛坐臥不寧旋覆花赤芍藥荊芥穗半夏曲前胡甘草炙茯苓五味子杏仁去皮尖麩炒麻黃各等分上㕮咀每服四錢水一盞半生薑三片棗一枚煎至七分去滓食前溫服有汗者去麻黃知母飲治産後惡露上攻流入於肺經咳嗽宜服此藥若傷風痰嗽卻以尋常傷風藥主治知母貝母白茯苓人參各二錢桃仁杏仁並生去皮尖各一錢上作一服水二盅煎至一盅食後服經效方療咳嗽多痰唾黏氣急前胡五味子紫菀貝母各一兩桑白皮茯苓各二兩淡竹葉二十片上㕮咀水二升煎至八合去滓食後分二服百合散療産後咳嗽氣急百部根苦梗各六分桑白皮二十分干百合赤茯苓各八分上㕮咀水二升煮取七合去滓食後分兩服喘類産後所下過多榮血暴竭衛氣無主獨聚肺中故令嗽也此名孤陽絶陰為難治若惡露不快敗血停凝上薰於肺亦令喘急但服奪命丹血去喘自定血竭散治産後敗血衝心胸滿上喘命在須臾宜服真血竭如無紫礦代沒藥上等分研細每服二錢用童便合好酒半大盞煎一沸溫調下方産下一服上床良久再服其惡血自循經下更不衝上免生百病參蘇飲治産後血入於肺面黑髮喘欲死者人參一兩為末蘇木二兩上以水兩碗煮取蘇木一碗以下去滓調參末隨時加減服神效旋覆花湯見前咳嗽若傷鹹冷飲食而喘者宜見睍丸見前痞悶類大補湯治産後百日外面青浮腫唇口氣急有汗乃大虛之症急用服此當歸頭大川芎大白朮白芍藥白茯苓多人參多黃耆多五味子熟地黃乾薑甘草少上銼散水煎服如痰不退加川烏木香另磨入服有瀉加訶子肉豆蔻粟殼五味子湯治産後喘促脈伏而厥五味子柞炒人參杏仁各二錢麥門冬去心陳皮各一兩上姜三片棗二枚水煎服血崩類産臥傷耗經脈未得平復勞役損動致血暴崩淋瀝不止或因酸鹹不節傷蠹榮衛衰弱亦變崩中若小腹滿痛肝經已壞為難治急服固經丸以止之固經丸艾葉赤石脂煅補骨脂炒木賊各半兩附子一枚炮上為末陳米飯和丸如梧子大每服二十丸食前溫酒下米飲亦得瑞蓮散治産後惡血崩漏狀如泉水瑞蓮百枚燒存性棕櫚燒存性當歸桂心各一兩鯉魚鱗燒川芎各七錢檳榔二枚上為細末每服三錢煨姜酒調下如未止更進一服或非時血崩無藥可治但進三服即止白芍藥散治産後崩中下血淋漓不絶黃瘦虛損白芍藥牡蠣乾薑熟地黃桂心黃耆鹿角膠龍骨各一錢烏賊血骨上為末每服二錢食前溫酒下阿膠丸治産後崩中下血不止虛羸無力阿膠赤石脂各一兩半續斷川芎當歸甘草丹參各一兩龍骨鹿茸酥炙諸魚骨烏賊血骨鱉甲炙各二兩上共為細末煉蜜為丸梧桐子大空心溫酒一日二三十丸菖蒲酒治産後崩中下血不止菖蒲一兩半細銼以酒二盞煮取一盞去滓分三服食前月水不調類産後月水不調者由産傷動血氣虛損風邪冷熱之氣客於經絡乍冷乍熱冷則血結熱則血消故血或多或少或在月前或在月後故名不調也琉珀調經散治産後經脈不調四肢煩疼飲食全少日漸羸瘦琥珀牛膝生乾地黃當歸各一兩桃仁赤芍藥各半兩上為細末每服三錢水一盞姜三片煎六分去滓服薑黃丸治産後虛乏不足心胸短氣腹內緊急腰背疼痛月水不調食少煩渴四肢無力薑黃當歸熟地黃牡丹皮厚朴制桂心川芎續斷桃仁白朮各一兩赤芍藥木香各七錢半羚羊角屑二錢半上為細末煉蜜如桐子大每服三十丸食前服溫酒下瀉痢類産後腹痛瀉痢者皆因産後腸胃虛怯寒邪易侵若未滿月飲冷當風乘虛襲留於盲膜散於腹脅故腹痛作陳或如錐刀所刺流入大腸水穀不化洞泄腸鳴或下赤白胠脅填張或痛走不定急服調中湯立愈若醫為積滯取之禍不旋踵調中湯高良薑當歸桂心芍藥附子炮川芎各一兩甘草半兩上為粗末每服三錢匕水三盞煎一盞去滓熱服茯苓湯治産後泄茯苓川芎黃芩白朮乾薑滑石陳皮芍藥炒各等分上水煎服之人參白朮散治産後泄瀉人參白朮茯苓甘草陳皮半夏製厚朴砂仁當歸神麯炒姜三片水煎服歸芎散治産後身熱腹痛泄瀉當歸川芎白芍藥玄胡索砂仁甘草白朮神麯茯苓乾薑皮水姜煎服赤白痢疾類産後痢疾者由産勞傷臟腑不足勞動太早誤食生冷風冷乘虛誤入腸胃生冷難化之物傷於脾胃皆令洞泄水瀉甚者變為痢也若血滲入大腸則為血痢難治世謂之産子痢也得冷則白或如魚腦得熱則赤黃或為驟血若冷熱相搏則下赤白痢或膿血相雜若下痢青色則極冷也若飲食不進日夜無度産後本虛久痢不止必至危篤當慎治之急救散治産後赤白痢腹中絞痛芍藥阿膠艾葉熟地黃各一兩甘草當歸各三兩上㕮咀水煎分二服空心飲黃連丸治産後赤白痢腹中攪痛不可忍黃連四兩阿膠蒲黃梔子仁各一兩當歸二兩半黃芩黃柏各二兩上為末煉蜜丸如梧桐子大每服六七十丸米飲吞下日三夜一白頭翁散治産後下痢虛極者白頭翁阿膠各二兩黃連黃柏秦皮各三兩甘草二兩上以水七升煮取二升半納膠令消盡溫分三服神馬飲治産後血痢小便不通臍腹疼痛用生馬齒莧搗汁二大合煎一沸下蜜一合調頓服又方産後痢日五十行者取木里蛀蟲糞屑炒黃急以水沃之令稠稀得所服之即瘥經效方治産後久痢津液涸渴不止龍骨十二分厚朴茯苓黃耆麥門冬人參各八分生薑六分大棗十四個並細銼上以水一大升煮取七合空心分兩服當歸飲産後痢疾當歸川芎芍藥香附炒陳皮茯苓甘草砂仁澤瀉白朮神麯炒乾薑炒木香不見火為末余藥煎熟入末服上水煎服神龜散治産後胎前痢疾敗龜甲一枚米醋炙研為末醋湯調下獨梔散婦人臨産痢疾山梔不拘多少燒灰為末空心溫服熱水調下一錢甚者不過五服大便祕澀類産臥水血俱下腸胃虛竭津液不足是以大便祕澀不通也若過五六日腹中悶脹者此乃燥糞在臟腑以其乾澀未能出耳宜服麻仁丸以津潤之誤為有熱投之寒藥則陽消陰長變證百出性命危矣麻仁丸麻仁研如泥枳殼人參各一兩大黃半兩上為末煉蜜丸如梧桐子大空心溫酒下二十丸未通漸加丸數不可太過四物青皮湯當歸川芎生地芍藥青皮去白水煎服甚效神應散産後祕結不通膨滿者氣急坐臥俱難用大麥糵炒共同為末酒下一合神效大小便不通類産後大小便不通者腸胃本挾於熱因産血水俱下津液燥竭腸胃痞澀熱氣結於腸胃故令大小便不通也桃仁散治膀胱氣滯血澀大小便祕桃仁葵子滑石檳榔各等分上為細末每服二錢空心蔥白湯調下車前散治産後大小便不利下血車前子黃芩蒲黃牡蠣生地黃肥市芍藥各一兩五錢上為細末空心米飲服方寸匕忌面蒜乳飲治産後大小便不通諸藥不應者令飲牛乳人乳尤善一日稍通三日而痊淋閉類産後諸淋因産有熱氣客於脬中內虛則起數熱則小便澀痛故謂之淋有因産損氣虛則挾熱熱則搏於血即流滲於胞中故血隨小便出而為血淋淋者淋瀝之謂也茅根湯治産後諸淋無問冷熱膏石氣結悉主之白茅根八兩瞿麥穗白茯苓各四兩葵子人參各二兩蒲黃桃膠滑石甘草各一兩紫貝十枚煅石首魚頭中石二十枚燒上銼散每服四大錢水一盞半姜三片燈心二十莖煎至七分去滓溫服亦可為末木通煎湯調下二錢如氣壅閉木通橘皮煎湯調下滑石散療産後淋滑石一兩二錢半研通草車前子葵子各一兩上為末以漿水調服方寸匕至二匕為妙張不愚方療産後小便不通淋閉陳皮一兩去白為末空心溫酒調下二錢一服便通魚齒散治産後淋小便痛及血淋白茅根五兩瞿麥車前子各二兩鯉魚齒一百枚為末通草三兩冬葵子二合上水二升煮取一升入魚齒末空心服灸法産後小便不通腹脹如鼓悶亂不醒蓋緣未産之時因積冷氣遂致産時尿胞運動不順用鹽於産婦臍中填與臍平用蔥白剝去粗皮十餘根作一縛切作一指厚安鹽上用大艾炷滿蔥並子大小以火灸之覺熱氣直入腹中即時便通神驗小便類産後小便數者乃氣虛不能制或因穩婆不慎以致胞損而小便淋瀝或因膀胱氣虛而小便頻數或膀胱陰虛而小便淋瀝隨經補治之桑螵蛸散治産後小便數及遺尿桑螵蛸三十枚煨鹿茸酥炙黃耆各三兩牡蠣煨人參厚朴赤石脂各二兩上為末空心粥飲調下二錢栝蔞湯療産後小便數兼渴桑螵蛸甘草並炙黃連生薑各二兩栝蔞根三兩人參三兩大棗五十枚上細切用水七升煮二升半分三服忌豬肉冷水又方治産小便數及遺尿益智仁為末米飲調下小便不禁類婦人産蓐産理不順致傷膀胱遺尿無禁或因收生不謹損破尿脬致患此疾止遺方産後尿不禁面微浮略發熱於午後此膀胱為坐婆所傷黃耆歸身尾芍藥各一錢半白朮一錢人參陳皮各五分甘草炙少許上水煎熱服之廣濟方治産後小便不禁雞尾毛燒存性酒調下一匕日三服千金方治産後遺尿不知出白薇芍藥各等分上為末酒服方寸匕日三固脬散治婦人臨産時傷於脬破小便不禁黃絲絹自然黃者染色不用三尺以炭灰汁煮極爛以清水洗去灰令淨入黃蠟半兩蜜一兩茅根二兩馬屁勃末二錢上用水二升再煎至一盞空心頓服服時飲氣服之不得作聲作聲無驗補脬飲治産後傷動脬破終日不小便但淋濕不幹生絲絹黃色者一尺白牡丹皮根木白茯苓各一錢用水一碗煎至絹爛如餳服之勿作聲作聲無效雞內金散治産後溺床失禁以雞䏶胵一具並腸洗燒為末酒調服方寸匕小便出血類産後小便出血者因氣虛而熱乘之血得熱則流散滲於胞內故血隨小便出血餘散治小便利血亂髮湯洗垢膩淨上燒研為末米飲調服方寸匕又方用滑石研發灰等分每服一錢地黃汁調下崔氏方療産後血滲入大小腸蜜一大合車前子搗汁一升上相和煎沸分兩服補遺方治産後小便出血川牛膝去蘆水煎服二汁飲生地黃汁半升生薑自然汁半合上相和服之陰脫産門不閉類婦人趨産勞力努咽太過致陰下脫若脫肛狀及陰下挺出逼迫腫痛舉重房勞皆能發作清水續續小便淋露硫黃散治産後勞傷陰脫硫黃烏賊魚骨各半兩五味子二錢半上為末摻患處桃仁膏治産後陰腫妨悶桃仁去皮尖枯礬五味子各等分上以下二味為末研桃仁為膏拌勻傅之硫黃湯治産勞玉門開而不閉硫黃四兩吳茱萸菟絲子各一兩半蛇床子一兩上每服四錢水一碗煎數沸濾滓洗玉門日再洗尉法單炒蛇床子乘熱布裹尉患處亦治産後陰痛歸芩散治陰下脫當歸黃芩各二兩芍藥一兩半蝟皮燒存性半兩牡蠣煅二兩半共為末每服二錢溫酒米湯任意調下忌登高舉重又方産後子宮不閉補中益氣湯加白芍醋附半夏酒芩熱不退加酒柏外治方治産後陰腫下脫內出玉門不閉石灰一升炒極熱湯二升投灰中適溫冷澄清坐水中以浸玉門斯須平復如故又方療産後陰下脫燒兔頭末傅之又方以鐵精粉上推內之補遺方治産後生腸不收用枳殼煎湯坐浸良久即入又方萆麻子十四粒去殼搗爛塗頂心如收即洗去又方五倍子白礬煎湯浸洗良乳少類婦人乳汁或行或不行者皆由氣血虛弱經絡不調所致也乳汁勿令投於地蟲蟻食之令乳無汁大抵婦人素有疾在衝任經者乳汁少而色帶黃所生之子怯弱而多疾漏蘆散療乳婦氣脈壅塞乳汁不行及經絡凝滯奶乳脹痛留蓄邪毒或作癰腫此藥服之自然內消乳汁通行漏蘆二兩半蛇蛻十條炙瓜蔞十個急火燒焦存性上為末溫酒調下二錢服藥後即以豬蹄羹投之又方葵菜子炒香縮砂仁各等分上為細末每服二錢熱酒調下滋益氣脈榮衛行津液極有驗産寶方療産後乳無汁土瓜根漏蘆各三兩甘草二兩通草四兩上水八升煎取二升分溫三服忌如常法湧泉散療産乳無汁亦治乳結癰腫穿山甲洗淨一兩灰炒燥上為細末酒調服方寸匕鍾乳散療乳婦氣少血衰脈澀不行乳汁絶少成煉鍾乳粉研細濃煎漏蘆湯調下二錢靈苑立效方粳米糯米各半合萵苣子一合並淘淨生甘草半兩用水二升煎汁去滓三服立下羅氏湧泉散治婦人乳汁因氣絶少瞿麥穗麥門冬去心龍骨穿山甲炮黃王不留行各等分上為細末每服一錢熱酒調下後吃豬蹄羹少許吹奶類産後吹奶者因兒吃奶之次兒忽自睡呼氣不通乳不時泄蓄積在內遂成腫硬壅閉乳道津液不通傷結疼痛亦有不癢不痛腫硬如石名曰吹奶若不急治腫甚成癰産後吹奶少若緩治結癰致死時或有之速用皂角散栝蔞散傅以天南星散以手揉之則散矣栝蔞散乳香一錢研栝蔞實一個研勻溫酒煎服天南星散南星為末溫湯調以鵝翎醮塗患處皂角散歌曰婦人吹奶治何如皂角燒灰蛤粉和熱酒一杯調八字須臾揉散笑呵呵百藥煎散治奶結腫硬痛用百藥煎為細末每服三錢酒一盞煎數沸熱服青桑散青嫩桑葉研細米飲調攤紙上貼之妒乳類妒乳者由新産後兒未能飲之及乳不泄或乳脹捏其汁不盡皆令乳汁蓄結與血氣相搏即壯熱大渴引飲牢強掣痛手不得近是也初覺即以手捋捏去汁更令傍人助吮引之不爾或作瘡有膿熱甚必生癰也輕則為吹乳妒乳重則為癰雖有專門不可不知連翹湯治産後妒乳並癰連翹升麻芒硝玄參芍藥白蘞防風射干大黃杏仁甘草各一錢上作一服水二盅煎一盅食後服瓜蔞飲治産後婦乳初結脹不消令敗乳自退瓜蔞一個半生半炒大粉草一寸半生半炙生薑一塊半生半煨上同銼用酒一碗煮取一盞去滓服之其痛一會不可忍即搜去敗乳臨臥再一服順所患處乳側臥於床上令其藥行故也神應散治吹乳作癰葵莖及子搗篩為散酒服方寸匕即愈又方療乳腫將次結成癰上以馬溺塗之立愈赤龍皮湯凡婦人女子乳頭生小淺熱瘡搔之黃汁出浸淫為長百種療不差者動經年月名為妒乳槲皮三升切以水一斗煮取五升夏冷用秋冬溫之分以洗乳天麻湯天麻草五升切以水一斗半煎取一斗隨寒溫分洗乳以殺癢也洗畢敷膏散飛烏膏散用燒硃砂作水銀上黑煙三兩熬令焦燥礬石三兩燒粉上二味以絹篩細以甲煎和之令如脂以傅乳瘡日三作又方治乳頭破裂痛苧麻根搗傅之愈又方取秋後冷落茄子花裂開者陰乾燒存性水調塗之補遺經驗異症治類婦人無子非藥可療者二若年命相剋墳墓不嗣是也病夫病婦疾勞傷氣血並候不調將理失宜飲食不節乘風取涼冷氣乘虛結於子臟決難有孕自少有疾多服熱藥天癸早耗終身無子女人血弱子臟冷滯久不生育丈夫勞傷風虛目暗精氣不濃精清如水精冷如冰不能施化皆宜服藥産育正治之外更有異症非經圖所載者今廣諸見聞以備症療治灸法女人無子及已經生子久不再孕懷娠不成者上以女人右手中指節文一寸女指向上量之用草一條是七寸舒足仰臥以所量草自臍心直垂下至草盡處以筆點之此不是穴以原草平榻橫安前點處其草兩頭是穴按之有動脈各灸三壯如箸杪大極有神效勝金丸和血溫經治婦人久虛無子及産前後一切病患兼治男子下虛無力此藥能安胎催生妊胎臨月服五七丸産時減痛婦人無於是子宮冷如服二十丸男女自至又治積年血風腳手麻痹半身不遂赤白帶下血如山崩及治産後腹中結痛吐逆心痛子死腹中繞臍痛氣滿煩悶失蓋汗不出月水不通四肢浮腫無力血勞虛勞小便不禁中風不語口噤産後痢疾消渴眼前見鬼迷暈敗血上衝寒熱頭痛面色萎黃淋瀝諸疾血下無度血痢不止飲食無味産後傷寒虛煩勞悶産後血癖産後羸瘦凡婦人衆疾不問年深日近並宜服之一名金不換治婦諸虛不足心腹疼痛藁本當歸石脂赤白皆可白芍藥人參白薇川芎不見火牡丹皮桂心白芷白朮米泔浸白茯苓玄胡各一兩甘草炙山藥各五錢上為細末煉蜜丸如彈子大每服一丸溫酒化下初産了用熱醋湯下食前服此方凡婦人懷身便服此藥甚有神效常服尤妙溫中龍骨散澀脫燥濕治婦人腹下十二經絶産一曰白帶二曰赤帶三曰經水不利四曰陰胎五曰子臟堅六曰藏癖七曰陰陽患痛八曰內強九曰腹寒十曰臟閉十一曰五臟痠痛十二曰夢與鬼交並宜服之龍骨三兩半夏黃柏灶中黃土桂心乾薑各二兩石韋滑石各一兩烏賊魚骨代赭各四兩白殭蠶五枚上治下篩酒服方寸匕日三白多者加烏賊骨殭蠶各二兩赤多者加代赭五兩小腹冷加黃柏二兩子臟堅加乾薑官桂各二兩以上多隨病增之服藥三月有子即住藥太過多生兩子當審方取好藥寡婦童女不可妄服小白薇丸和劑治婦人衝任虛損子臟受寒久無子息及斷續不産此由上熱下冷百病滋生或月水崩下帶漏五色腰腹疼重面黃肌瘦或因産乳不能將護路廁太早或久坐濕地或冷風從下入血臟既虛風邪內乘或月水當行失於調攝傷動胞絡陰陽不和上焦虛陽壅燥下臟邪冷結伏致使胎孕不成冷極傷敗月水不勻飲食減少夜多盜汗面上䵟𪒟齒搖發落腳膝痛重舉動少力並宜服之覆盆子去梗菖蒲微炒遠志去心桃仁去皮尖麩炒黃白茯苓去皮藁本去苗卷柏去根肉桂去粗皮人參各三兩白龍骨且川椒去目併合口者炒出汗白薇去苗各一兩乾薑炮細辛去苗蛇床子炒當歸去蘆車前子芎藭各半兩熟地黃麥門冬去心各一兩半上為細末煉蜜和丸如梧桐子大每服三十丸空心用溫酒或米飲送下此藥常服壯筋骨益血氣暖子宮除風冷令人有子烏雞煎丸和劑治婦人胎前産後諸般疾患並皆治之此藥溫經之劑氣血攻補備焉烏雄雞一隻烏藥石床牡丹皮人參白朮黃耆各一兩蒼朮米泔浸切焙一兩半海桐皮肉桂去粗皮附子炮去皮臍白芍藥蓬莪朮川烏炮紅花陳皮各二兩玄胡索肉豆蔻木香琥珀熟地黃洗焙草果各半兩上細銼用烏雄雞一隻湯撏去毛及腸肚將上件藥安放雞肚中用新瓷瓶以好酒一斗同煮令乾去雞骨以油單盛焙乾為細末煉蜜和丸如梧桐子大每服三十丸胎前産後傷寒蜜糖酒下胎前氣悶壯熱炒姜酒下赤白帶生薑地黃酒下産後敗血注心童子小便炒姜酒下産後血塊填築心腹疼痛玄胡索酒下胎前嘔逆薑湯下催生炒蜀葵子酒下安胎鹽酒下室女經脈當通不通四肢疼痛煎紅花酒下血氣攻刺心腹疼痛煎當歸酒下血暈棕櫚燒灰酒調下血邪研硃砂麝香酒下血悶煎烏梅湯研硃砂下子宮久冷溫酒或棗湯下空心日一服血風勞人參酒吞下小腹㽲痛炒茴香鹽酒吞下血散四肢遍身虛浮黃腫赤小豆酒下常服溫酒醋湯任下並空心食前服濟陰丹理氣活血消積治婦人血海虛冷久無子息及産後敗血衝心中風口噤子死腹中擘開口灌藥須臾生下便得無恙治墮胎腹中攻刺痛橫生逆産胎衣不下血暈血癖血崩血滯血入四肢一應血臟有患及諸種風氣或傷風吐逆咳嗽寒熱往來遍身生瘡頭痛惡心經脈不調赤白帶下乳生惡氣胎臟虛冷數曾墮胎崩赤不定因此成疾室女經脈不通並宜服之當曰暖子宮和血氣悅顏色退風冷能消除百病三稜二兩蓬朮一兩切片煨蒼朮泔浸去皮枳殼去穰大艾去梗劉寄奴香附子淨敗姜各一兩半烏豆三合已上九味以谷醋三升煮乾取出焙乾當歸身酒蒸橘皮去白細紅者佳白芍藥各一兩半蒲黃隔紙炒牡丹皮去骨官桂去粗皮赤芍藥片薑黃青皮去白各一兩生地黃酒浸熟地黃酒浸川芎各七錢半玄胡索炒五靈脂酒煮白朮煨各半兩上為細末以糯米粉谷醋打糊為丸如梧桐子大每服五十丸空心沉香湯送下蘇湯鹽湯下亦可莪朮散理氣養血受妊之源隨證酌量加入莪朮煨川芎當歸熟地黃酒蒸洗白芷茴香楊芍藥甘草各一兩上為細末每服二錢鹽酒調下月水不調勻銀器加燈心安胎加黃耆生地黃補虛調氣加生薑紅棗遍身虛腫加當歸酒小便不通加滑石末心虛加硃砂研末調敗血衝心腹疼如刀刺燒稱錘紅淬酒如不退五靈脂酒洗稱遍身疼炒姜酒吐酸水加丁香七粒煎湯甚力也空攻眼目浮腫加荊芥小腹痛加木瓜艾上惟浮腫用薑湯或蔥湯胃虛噁心加藿香冷嗽加桑白皮乾柿頭痛加川芎細辛血風潮熱加生薑紅棗虛汗加麻黃根吐不止加青陳皮血風腰痛加藝臺子槌碎女人血結不通手發攣急不知其數薺菜一攝順流水柳汁下手足痹樟柳根浸酒女人血氣成塊築心銀子燈心血崩赤白帶真龍骨末好紅酒調血風衝心狂言亂語渾身壯熱加桃柳枝七寸血刺成塊不散菴䕡女人癖氣膈氣炒茴香酒婦人不問虛熱傷風潮熱憎寒一切百病先以三服隨證湯引投之服以他藥調理甚應驗冷嗽豬血心燥豬肝酒催生順流水滑石禹餘糧榆白皮坯子乳香葵子酸車草汁煎湯黃柞葉垂下者胎衣不下再加荗朮地黃竹青行血菴䕡生地黃紅花蘇木陳艾減楊芍藥加赤芍藥婦人病去經調自成妊娠溫白丸治婦人病去繼續而生帶下淋瀝五邪失心憂愁思慮意思不樂飲食無味月水不調及腹中一切疾病有似懷孕連年纍月羸瘦困弊或歌或哭或如鬼所使以上諸症皆令無子服此藥效桔梗柴胡菖蒲吳茱萸湯泡七次焙乾紫菀去苗土黃連去毛肉桂去粗皮厚朴去粗皮薑汁炙人參茯苓皂角去皮子炙蜀椒去目並含口者炒出汗巴豆去皮心膜出油炒細研各半兩川烏炮去皮臍二兩半上為細末研勻煉蜜丸梧子大每服三丸漸加至五七丸食後臨臥薑湯送下琥珀澤蘭煎和劑治婦人三十六種血氣八風五痹七癥八瘕心腹刺痛中風癱瘓手足痠疼乳中結瘀妊娠胎動胎死不出産衣不下敗血湊心頭旋眼花血疰四肢渾身浮腫衝任久虛絶産無嗣早晚服食或因有子經脈不調赤白帶下噁心嘔逆身體瘦倦懷妊八月一日一服滑胎易産琥珀澤蘭葉牡丹皮去心紫巴戟去心糯米炒茴香五味子去梗五加皮劉寄奴去枝白芷川當歸酒浸赤芍藥金叉石斛去根酒浸川芎白芍藥生地黃洗焙熟地黃洗焙人參白朮附子艾葉醋炒糯米糊調成餅焙乾為末各一兩上為細末煉蜜和丸如彈子大每服一丸食前用溫酒磨化服漏胎刺痛煮糯米飲下寒熱往來四肢煩痛煎青蒿酒下婦人室女經閉煎紅花酒下血暈不省人事童子小便和暖酒下催生雞子清和酒下血氣血塊攻刺心腹燒稱錘淬酒下傷寒及中風口噤煎麻黃湯下以被蓋出汗即愈心驚悸及頭痛薄荷酒下咳嗽煎桑白湯下血氣攻疰渾身瘙癢頭面麻痹炒黑豆浸酒下産後産前常服不生諸疾甚效喑症類孕婦不語非病也間有如此者不須服藥臨産月但服保生丸四物湯之類産下便語得亦自然之理非藥之功也醫家不說與人臨月則與尋常之藥産後能語則以為醫之功豈其功也哉黃帝問曰人有重身九月而喑此為何也岐伯對曰胞之絡脈絶也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言帝曰治之奈何岐伯曰無治也當十月復治婦人生下孩兒但不能發聲謂之夢生世俗多不知救深為可憫今後有此切不可斷臍將胞衣用火炙令暖氣入兒腹內卻取貓一隻用青布袋裹其頭足使一伶俐婦人拿住貓頭向兒耳邊以口著力咬破貓耳貓忽大叫一聲兒即省開口發聲遂得生矣又法兒因難産或逆産下不哭微有氣者即以本父母真氣度之亦活皆經驗方也
