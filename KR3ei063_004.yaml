body:
  text: 卷四瘛瘲類瘛者筋脈拘急也瘲者筋脈張瘲也經云肝主筋而藏血蓋肝氣為陽為火肝血為陰為水此症因産血過多陽火熾盛筋無所養而然耳至聖防風湯治風虛發熱項背拘急肢節不隨恍惚狂言來去無時不自覺悟亦治腳氣緩弱甚效此藥溫和不虛人秦艽獨活麻黃去節半夏湯泡七次切片防風各二兩升麻防己白朮石膏煅白芍藥黃芩甘草當歸遠志人參各一兩上為粗末入半夏片令勻每服四錢水二盞生薑七八片煎至一盞去滓取清汁六分入麝香末少許食後臨臥帶熱服海藏愈風湯即華他愈風湯治前症增損柴胡湯治産後感異證手足牽搐涎潮昏悶柴胡三錢黃芩一錢二分人參甘草炙半夏各一錢半知母一錢石膏二錢黃耆二錢半上㕮咀分二服水二盞姜三片棗二枚煎八分服秦艽湯前症已去次服此藥去其風邪秦艽芍藥柴胡各一錢七分炙甘草一錢三分黃芩防風各一錢二分人參半夏各一錢上㕮咀分二服每服水二盞姜三片煎八分食遠服拘攣類産後中風筋脈四肢孿急是氣血不足臟腑俱虛勞役虛損正氣未復為風所乘風邪冷氣客於皮膚經絡令人頑痹不仁風氣入於筋脈挾寒則攣急也芎藭湯治産後中風四肢筋脈攣急疼痛背項強急芎藭羌活當歸酸棗仁炒羚羊角屑各七錢半防風牛蒡子各一兩炒桂心赤芍藥各半兩上㕮咀每服八錢水一大盞半煎至一大盞去滓溫服防己膏治産後中風四肢筋脈攣急身體麻痹並宜用之漢防己去皮半斤茵芋五兩上㕮咀用酒五升浸藥一宿取豬肪脂一斤文武火熬三上三下成膏攤在紙花上貼病人患處以熱手不住摩膏上不語類人心有七孔三毛産後虛弱多致停積敗血閉於心竅神志不能明瞭又心氣通於舌心氣閉塞則舌亦強矣故令不語七珍散人參石菖蒲生地黃川芎各一兩細辛一錢防風辰砂另研各半兩上為極細末每服一錢薄荷湯調下無時孤鳳散治産後閉目不語用生白礬末每服一錢熱水調下參蓮飲治産後不語人參石蓮肉不去心石菖蒲各等分上每服五錢水煎逐血補心湯治産後失音不語紅花赤芍藥生地黃桔梗蘇葉前胡茯苓防風牛膽南星黃連粉葛各二錢當歸三錢薄荷人參升麻各一錢半半夏二錢五分甘草一錢上銼為散分作二服每服水一盅半姜三片煎至七分空心服滓再煎狂言譫語顛狂乍見鬼神類夫産後語言顛倒狂言譫語如見鬼神産後因驚敗血衝心昏悶發狂或因産傷血脈心氣既虛敗血停積上干於心心中煩躁言語顛錯臥起不安乍見鬼神荷葉散産後敗血衝心發熱狂言奔走脈虛大者乾荷葉生地黃牡丹皮等分三味濃煎湯調生蒲黃末二錢匕一服即定烏金散治産後三五日或半月之間忽狂言亂語目見鬼神等證當歸遠志肉川芎酸棗仁白朮赤芍香附辰砂另研入熟地羌活防風各二錢茯神二錢半夏三錢全蠍麥門冬人參牛膝天麻各一錢甘草九分陳皮白芷各一錢半上銼散作二服水一盅生薑三片蔥三枝入金銀同煎一碗溫服四物補心湯治産後言語恍惚顛倒錯亂當歸五錢川芎生地黃白芍藥茯神半夏桔梗白朮各四錢陳皮三錢甘草一錢上銼為散分作六服每服用水一盅姜三片煎至七分空心溫服有熱加酒炒黃連二錢無熱不用茯神散治産後血邪心神恍惚言語失度睡臥不安茯神一兩去皮木人參龍齒研琥珀研赤芍藥黃耆牛膝各七錢半生地黃一兩半桂心半兩上為末每服三錢水一盅煎七分去滓溫服柏子仁散治産後狂言亂語皆因內虛敗血挾邪氣攻心柏子仁遠志去心人參桑寄生防風琥珀另研當歸焙生地黃焙甘草各等分上為粗末先用白羊心一個切片以水一大盞半先煮至九分去羊心入藥末五錢煎六分去滓服驚悸恍惚類産後臟虛心神驚悸由體虛心氣不足心之經為風邪所乘或恐懼憂迫亦令心氣受於心邪若驚不已則悸動不定其狀目睛不轉而不能動診其脈動則為驚弱則為悸令人心神恍惚不定也白茯苓散治産後心神驚悸言語失常心神昏憒白茯苓熟地黃人參各一兩遠志去心白芍藥黃耆桂心當歸炒甘草炙麥門冬各一兩石菖蒲桑寄生各七錢半上為㕮咀每服八錢水一大盞半生薑五片棗三枚竹葉三七片煎至一大盞去滓溫服産乳七寶散初産後服之調和血氣補虛安心神鎮驚悸硃砂水飛桂心當歸川芎人參白茯苓羚羊角燒存性各二錢乾薑一錢為細末每服一錢用羌活豆淋酒調下不飲酒清米飲調下琥珀辰砂散治血虛多驚及産後敗血諸疾辰砂琥珀沒藥並細研當歸各等分上為細末每服二錢空心白湯調下日三服千全方療産後暴苦心悸不定言語錯亂恍惚皆因心虛所致茯苓三兩芍藥二藥甘草桂心當歸各一兩生薑一兩半麥門冬去心一升大棗三十枚上為散水三升煎取一升去滓分作兩服天麻丸療産後中風恍惚語澀四肢不隨天麻硃砂水飛防風羌活各一兩殭蠶炒七錢半乾蠍炒白附子炮五靈脂炒各半兩雄雀糞炒牛黃另研各二錢半上為細末糯米飯為丸如梧子大每服二三十丸薄荷酒送下日進三服發熱煩渴類産後虛煩發熱乃陽隨陰散氣血俱虛若惡寒發熱煩躁作渴急用十全大補湯若熱愈甚急加桂附若作渴面赤宜用當歸補血渴若誤認為火症投以涼劑禍在反掌三之一湯治産後虛勞發熱日久不安柴胡黃芩人參半夏川芎當歸芍藥熟地甘草各一錢半作一帖水二盅姜三片紅棗一枚煎一盅服三分散治産後日久虛勞發熱川芎當歸芍藥熟地黃白朮白茯苓黃耆各一錢柴胡人參半夏甘草各半錢上作一服水二盅生薑三片紅棗一枚煎至一盅食前服加味逍遙散治産後發熱口乾作渴唇裂生瘡當歸白芍藥乾葛各二錢生地黃川芎黃芩各一錢半人參九分麥門冬九分柴胡一錢烏梅二個甘草六分上銼散分作二服用水一盅煎七分空心服産後發熱多屬虛寒惟乾薑加入補藥中神效此丹溪法也沒藥丸治産後心胸煩躁惡血不快沒藥研蠻姜延胡索乾漆炒當歸桂心牛膝牡丹皮乾薑各等分上為細末醋煮麵糊丸如梧桐子大煎曲湯下十丸至十五丸竹葉湯治産後短氣欲絶心中煩悶竹葉切細麥門冬小麥各一升甘草一兩生薑二兩大棗十二枚上切以水一斗煮竹葉小麥至八升去滓納余藥煮取三升去滓溫服虛悸加人參二兩少氣加糯米五合甘竹茹湯治産後內虛煩熱短氣甘竹茹一升人參茯苓甘草各一兩黃芩三兩上㕮咀以水六升煮取二升去滓分三服日三人參當歸湯治産後去血過多血虛則陰虛陰虛生內熱令人心悶短氣自汗頭痛熟地黃人參當歸身肉桂麥門冬去心各二錢白芍藥炒二錢半血熱甚者加生地黃二錢水二盅糯米一合竹葉十片煎一盅食遠服産寶方治産後大渴不止蘆根切一升瓜蔞人參甘草茯苓各三兩大棗二十枚麥冬四兩上以水九升煮取三升分三服頓服四劑即瘥忌菘菜黃芩散治産後血渴飲水不止黃芩麥門冬各等分上㕮咀每服三錢水盞半煎八分去滓溫服竹葉歸耆湯治胃氣虛弱口乾作渴惡冷飲食者竹葉一錢半黃耆二錢白朮人參當歸各一錢麥門冬七分甘草炒五分上水煎服玄胡索散治産後失血渴不止鬱金乾葛桂心青皮枳殼玄胡索上等分以好醋浸一宿焙乾末之每服二錢陳皮湯調下日三夜一回津丸産後虛渴去血多津液少腎氣虛引飲無度當養血通氣回津補氣則安白芍藥澤瀉茯苓川芎各一錢當歸白朮五味各二錢烏梅肉一錢上為細末煉蜜丸熱水吞下三十丸一方加甘草二錢訶子一錢自汗盜汗類産後虛汗不止者由陰氣虛而陽氣加之裡虛表實陽氣獨發於外故汗出也血為陰産則傷血是為陰氣虛也陽加於陰故令汗出陰陽虛弱不復則汗出不止多産後多汗遇風變成痙縱不成痓亦虛之短氣身體柴瘦口乾燥久則經水斷絶由津液竭也全生活血湯治發熱自汗盜汗目𢟨𢟨四肢無力口乾頭暈行步欹側升麻芍藥炒各三錢柴胡當歸防風羌活獨活葛根甘草炒各二錢川芎藁本各一錢半生地熟地各一錢細辛蔓荊子各五分紅花三分上每服五錢水煎熱服麻黃根散治産後虛汗不止當歸黃耆麻黃牡蠣煅為粉人參粉草各等分上㕮咀每服四錢水一盞煎七分去滓溫服經效方治産後汗出不止黃耆十二分白朮牡蠣煅茯苓防風麥冬去心生地黃各八分大棗七枚上㕮咀水二升煮取七合去滓空心分溫兩服止汗散治産後盜汗不止一應汗多者皆可服牡蠣煅研粉小麥麩炒令黃色碾為粉上等分和勻煮生豬肉汁調下二錢無時服人參湯治産後諸虛不足發熱盜汗人參當歸各等分上為末以豬腰子一隻去脂膜切小片子以水三升糯米半合蔥白二條煮米熟取清汁一盞入藥二錢煎至八分溫服當歸六黃湯治氣血虛熱盜汗不止心血不足加酸棗仁炒當歸熟地黃耆炒各二錢生地黃柏炒黑黃芩炒黑黃連炒黑各一錢上水煎服往來寒熱類産後血氣虛損陰陽不和敗血不散能令乍寒乍熱陰勝則寒陽勝則熱陰陽相乘或寒或熱若因産勞傷臟腑血弱不得宣越故令敗血不散入於肺則熱入於脾則寒若誤作瘧治之則謬矣加減烏金散治産且寒熱似瘧厚朴柴胡黃芩麻黃各二錢陳皮當歸川芎桔梗茯苓各一錢半桂枝蒼朮白芷枳殼各一錢羌活草果半夏各二錢甘草九分白芍藥熟地黃各一錢半上銼為散分作兩服每服用水一盅半生薑三片蔥三莖煎一盅服有汗加當歸川芎白芍熟地有脹倍厚朴陳皮有熱加柴胡黃芩有寒加蒼朮草果桂枝有痰多半夏桔梗茯苓有頭痛多川芎白芷羌活有瀉去枳殼甘草不用增損柴胡湯治産後虛發寒熱飲食少腹脹柴胡人參甘草半夏陳皮川芎白芍藥各等分上每服三錢姜五片棗二枚水同煎食後日二服熟地黃散治産後蓐勞皆由體虛氣力未壯勞復四肢煩疼時發寒熱不思飲食熟地黃人參白芍藥白茯苓白朮續斷各兩黃耆桂心五味子當歸川芎各七錢半上㕮咀每服四錢姜三片棗一枚水煎服黃耆丸治産後蓐勞寒熱進退頭目眩痛骨節痠疼氣力羸乏黃耆鱉甲當歸炒各一兩桂心白芍藥續斷川芎牛膝蓯蓉沉香柏子仁枳殼各七錢半五味子熟地黃各半兩共為細末煉蜜丸如梧子大每服四五十丸食後粥飲下瘧類産後瘧疾多由汙血挾寒熱而作或因脾胃虛弱飲食停滯或外邪所感或鬱怒傷脾或暑邪所伏審證而治草果飲子治産後瘧疾寒熱相半者或多熱宜此半夏湯泡赤茯苓甘草炙草果炮去支川芎陳皮白芷各二錢青皮去白良薑紫蘇各一錢半乾葛四錢上㕮咀每服三錢水一盞姜三片棗二枚同煎至七分去滓當發日侵晨連進三服無有不安生熟飲子治産後瘧多寒者肉豆蔻草果仁厚朴半夏陳皮甘草大棗去核生薑上八味等分細銼和勻一半生一半用濕綿紙裹煨令香熱去紙與一半生者和勻每服五錢用水二盞煎至七分食前一服食後一服七寶飲久而不已者用此截之方見胎前瘧蓐勞虛羸類産後蓐勞者此由生産日淺血氣弱飲食尚未平復日月未滿氣血虛羸將養失所風冷客之風冷搏於氣血則不能溫於肌膚使人虛乏勞倦顏容憔悴食飲不消風邪感於肺肺受微寒故咳嗽口乾遂覺頭昏百節疼痛榮衛風邪流注臟腑盜汗顏發寒熱如瘧背膊煩悶四肢不舉沉重著床此則蓐勞之候也石子湯療産後虛羸喘乏乍寒乍熱如瘧四肢疼痛面色萎黃名曰蓐勞豬石子一雙去膜脂四破香豉一方無此有知母蔥白切粳米當歸芍藥各二兩上㕮咀分兩劑每劑用水三升煮取一小碗去滓分三服豬腰子粥治蓐勞發熱用豬腰子一枚去白膜切作柳葉片以鹽酒拌先用粳米一合入