body:
  text: 婦人脈法婦人尺脈常盛而右手脈大皆其常也若腎脈微澀或左手關後尺內脈浮或肝脈沉而急或尺脈滑而斷絕不勻皆經閉不調之候也婦人三部脈沉浮正等按之無絕無他病而不月者有娠也又尺中有神與關相應和滑者亦然妊娠初時寸微小呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也經曰陰搏陽別謂之有子夫陰謂尺中搏謂搏擊於手此陽施陰化法當有娠婦人妊娠四月欲知男女法左疾為男右疾為女俱疾為生二子又法得太陰脈為男得太陽脈為女太陰脈沉太陽脈浮又法左手沉實為男右手浮大為女左右手俱沉實猥生二男左右手俱浮大猥生二女婦人經自斷而有軀其脈反弦其後必大下不成孕也寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏脈則為革婦人半產漏下少陰脈浮而緊則疝瘕腹中痛半產而墮傷浮則亡血絕產惡寒婦人妊娠七月脈實大牢強者生沉細者死婦人妊娠八月脈實大牢強弦緊者生沉細者死婦人懷孕離經其脈浮設腹痛引腰脊為今欲生也但離經者不病也又法婦人慾生其脈離經夜半覺日中則生也此離經非難經一呼三至一呼一至也此謂離乎經常之脈也新產小緩滑者生實牢堅者死新生乳子脈沉小滑者生實大堅弦急者死新生乳子因得熱病其脈懸小四肢溫者生寒清者死新產因中風傷寒熱病喘鳴而肩息脈實大浮緩者生小急者死新產之後寸口脈焱疾不調者死沉微附骨不絕者生脈微弱而澀年少得此為無子中年得此為絕產肥人脈細胞中有寒故令少子其色黃者胸上有寒寸口脈沉而遲沉則為水遲則為寒寒水相搏趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身體腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰水分寸口脈沉而數數則為出沉則為入出則為陽實入則為陰結趺陽脈搏微而弦微則無胃氣弦則不得息少陰脈沉而滑沉則為在裡滑則為實沉滑相搏血結胞門其臟不瀉經絡不通名曰血分經水前斷後病水名曰血分此病為難治先病水後經水斷名曰水分此病易治何以故去水其經自當下寸口脈微而澀微則衛氣不足澀則血氣無餘衛不足其息短其形燥血不足其形逆榮衛俱虛言語謬誤趺陽脈浮而澀澀則胃氣虛虛則短氣咽燥而口苦胃寒澀則失液少陰脈微而遲微則無精遲則陰中寒澀則血不來此為居經三月一來脈微血氣俱虛年少者亡血也乳子下利為可不者此為居經三月一來婦人月經一月再來者經來其脈欲自如常而反微不利不汗出者其經二月必來寸關調如故而尺脈絕不至者月經不利當患少腹引腰絞痛氣積聚上攻胸臆也尺脈來而斷絕者婦人月水不利尺脈滑血氣實婦人經脈不利肝脈沉主月水不利腰腹痛脈來至狀如琴絃苦少腹痛主月水不利孔竅生瘡月經不通脈絕小實者生浮虛者死經不通繞臍寒疝痛其脈沉緊此由寒氣客於血室凝結不行積血為氣所沖新血與故血相搏故痛疝瘕積聚脈弦急者生虛弱小者死少陰脈滑而數者陰中則生瘡少陰脈滑則氣淋陰中生瘡少陰脈弦者白腸必挺核少陰脈浮而動浮則為虛動則為痛婦人則脫下寸口脈微而弱氣血俱虛婦人下血嘔汁出尺中虛者漏血小便不禁尺脈急而弦大風邪入少陰之經女子漏白下赤崩漏下血寸口脈微遲尺脈微弦微遲為寒在上焦但吐爾今尺脈微弦如此主小腹引腰脊痛者必下血也尺寸脈虛者漏血若脈弦者不可治尺中微而滑者帶下病婦人帶下六極之病脈浮則為腸鳴腹痛緊則腹中痛數則為陰中癢痛則生瘡弦則陰疼掣痛婦人帶下脈浮惡寒漏下者不治漏血下赤白脈遲或虛小滑者生急疾大緊數者死漏下赤白日下血數升脈急疾者死遲者生凡婦人室女病傷寒及諸寒熱氣滯須問經事若何產後須問惡露有無多少
